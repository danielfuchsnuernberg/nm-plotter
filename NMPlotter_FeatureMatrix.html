<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NM Plotter — Feature Matrix</title>
<style>
  :root{
    --bg:#0a0e13; --bg-2:#0f141b; --panel:#0d1219; --inset:#12191f;
    --border:#1a2330; --border-strong:#2a3744;
    --text:#dce6f0; --text-2:#b8c5d1; --text-dim:#8a9bb0; --text-muted:#7d93a8;
    --text-faint:#5f7186; --text-fainter:#46566a;
    --accent:#ffb020; --accent-2:#7fb3d5; --good:#34d399; --bad:#f0506e;
    --gps:#2b8cff;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --colw:52px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text); font-family:var(--sans);
    font-size:14px; line-height:1.4; -webkit-font-smoothing:antialiased;
    padding:0 0 48px;
  }
  a{color:var(--accent-2)}

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:30;
    background:linear-gradient(180deg,var(--panel),rgba(13,18,25,0.96));
    border-bottom:1px solid var(--border);
    padding:14px 16px 0;
  }
  .h-top{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap}
  .h-top h1{margin:0; font-size:16px; font-weight:600; letter-spacing:.2px}
  .h-sub{color:var(--text-faint); font-size:11.5px; font-family:var(--mono)}
  .counts{margin-left:auto; display:flex; gap:8px; font-family:var(--mono); font-size:11.5px}
  .cbadge{
    border:1px solid var(--border-strong); border-radius:6px;
    padding:3px 9px; color:var(--text-dim); background:var(--inset);
    white-space:nowrap;
  }
  .cbadge b{color:var(--accent); font-weight:600}

  /* ---------- toolbar ---------- */
  .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:12px 0 10px}
  .search{
    flex:1 1 200px; min-width:150px;
    background:var(--inset); border:1px solid var(--border-strong); border-radius:7px;
    color:var(--text); font-family:var(--sans); font-size:13px;
    padding:8px 11px; outline:none;
  }
  .search::placeholder{color:var(--text-fainter)}
  .search:focus{border-color:var(--accent-2)}
  .btn{
    background:var(--inset); border:1px solid var(--border-strong); border-radius:7px;
    color:var(--text-2); font-family:var(--sans); font-size:12.5px; font-weight:500;
    padding:8px 12px; cursor:pointer; white-space:nowrap;
  }
  .btn:hover{border-color:var(--accent-2); color:var(--text)}
  .btn:active{transform:translateY(1px)}

  .chips{display:flex; gap:6px; flex-wrap:wrap; padding:0 0 12px}
  .chip{
    background:var(--inset); border:1px solid var(--border); border-radius:20px;
    color:var(--text-dim); font-size:12px; font-family:var(--sans);
    padding:5px 12px; cursor:pointer; user-select:none;
  }
  .chip:hover{border-color:var(--border-strong); color:var(--text-2)}
  .chip.on{background:rgba(255,176,32,0.12); border-color:var(--accent); color:var(--accent)}
  .chip .dot{display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle}

  /* ---------- sticky column heads ---------- */
  .colhead{
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center;
    background:var(--panel); border-bottom:1px solid var(--border-strong);
    padding:8px 16px; margin-top:0;
    font-family:var(--mono); font-size:10.5px; letter-spacing:.6px; text-transform:uppercase;
    color:var(--text-faint);
  }
  .colhead .ch-label{flex:1}
  .colhead .ch-col{width:var(--colw); text-align:center; color:var(--accent-2)}

  /* ---------- sections ---------- */
  .wrap{padding:0 16px}
  .cat{margin-top:18px}
  .cat-h{
    display:flex; align-items:center; gap:10px;
    padding:8px 2px 8px; border-bottom:1px solid var(--border);
    margin-bottom:2px;
  }
  .cat-h .cat-name{font-size:12px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color:var(--text-2)}
  .cat-h .cat-count{font-family:var(--mono); font-size:10.5px; color:var(--text-fainter)}
  .cat-h .cat-cols{margin-left:auto; display:flex}
  .cat-h .cat-cols span{width:var(--colw)}

  .row{
    display:flex; align-items:center;
    padding:2px 0; border-bottom:1px solid rgba(26,35,48,0.5);
  }
  .row-main{
    flex:1; display:flex; align-items:center; gap:9px;
    padding:9px 2px; cursor:pointer; min-width:0;
  }
  .st{width:8px; height:8px; border-radius:50%; flex:0 0 auto}
  .st.done{background:var(--good)}
  .st.soon{background:var(--accent)}
  .st.planned{background:var(--text-fainter)}
  .r-name{color:var(--text); font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .row.is-planned .r-name{color:var(--text-dim)}
  .tag{
    font-family:var(--mono); font-size:9px; letter-spacing:.4px; text-transform:uppercase;
    border:1px solid var(--border-strong); border-radius:4px; padding:2px 5px;
    color:var(--text-faint); flex:0 0 auto;
  }
  .tag.setup{color:var(--gps); border-color:rgba(43,140,255,0.4)}
  .chev{
    margin-left:6px; color:var(--text-fainter); font-size:10px; flex:0 0 auto;
    transition:transform .15s; user-select:none;
  }
  .row.open .chev{transform:rotate(90deg)}

  .cell{
    width:var(--colw); display:flex; align-items:center; justify-content:center;
    align-self:stretch;
  }
  .cell.ipad{background:rgba(127,179,213,0.035)}
  .cell.iphone{background:rgba(127,179,213,0.07)}
  .tick{
    width:24px; height:24px; border-radius:6px;
    border:1.5px solid var(--border-strong); background:var(--inset);
    cursor:pointer; position:relative; padding:0;
    transition:border-color .12s, background .12s;
  }
  .tick:hover{border-color:var(--accent-2)}
  .tick.on{background:var(--accent); border-color:var(--accent)}
  .tick.on::after{
    content:""; position:absolute; left:7px; top:3px;
    width:6px; height:11px; border:solid #1b1205; border-width:0 2.5px 2.5px 0;
    transform:rotate(45deg);
  }

  /* ---------- expand panel ---------- */
  .detail{
    display:none; padding:0 2px 12px 19px;
    border-bottom:1px solid rgba(26,35,48,0.5);
  }
  .row.open + .detail{display:block}
  .detail p{margin:2px 0 0; color:var(--text-dim); font-size:12.5px; max-width:64ch}
  .howto{
    margin-top:9px; background:var(--inset); border:1px solid var(--border);
    border-left:2px solid var(--gps); border-radius:6px; padding:9px 11px;
  }
  .howto .ht-h{font-family:var(--mono); font-size:10px; letter-spacing:.5px; text-transform:uppercase; color:var(--gps); margin-bottom:5px}
  .howto ol{margin:0; padding-left:16px; color:var(--text-2); font-size:12.5px}
  .howto li{margin:3px 0}

  .empty{padding:40px 16px; text-align:center; color:var(--text-faint); font-size:13px}

  /* ---------- footer ---------- */
  footer{
    margin-top:26px; padding:14px 16px; border-top:1px solid var(--border);
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    font-family:var(--mono); font-size:10.5px; color:var(--text-fainter);
  }
  footer .legend{display:flex; gap:14px; flex-wrap:wrap}
  footer .lg{display:flex; align-items:center; gap:5px; color:var(--text-faint)}
  footer .stamp{margin-left:auto}

  /* import/export overlay */
  .ov{position:fixed; inset:0; background:rgba(4,7,11,0.72); display:none; align-items:center; justify-content:center; z-index:60; padding:18px}
  .ov.on{display:flex}
  .ov-win{background:var(--panel); border:1px solid var(--border-strong); border-radius:10px; width:100%; max-width:440px; padding:16px}
  .ov-win h3{margin:0 0 4px; font-size:14px}
  .ov-win p{margin:0 0 10px; color:var(--text-dim); font-size:12px}
  .ov-win textarea{
    width:100%; height:150px; resize:vertical; background:var(--inset);
    border:1px solid var(--border-strong); border-radius:7px; color:var(--text);
    font-family:var(--mono); font-size:11px; padding:9px; outline:none;
  }
  .ov-win textarea:focus{border-color:var(--accent-2)}
  .ov-acts{display:flex; gap:8px; justify-content:flex-end; margin-top:11px}
</style>
</head>
<body>

<header>
  <div class="h-top">
    <h1>NM Plotter — Feature Matrix</h1>
    <span class="h-sub" id="hSub">tick what belongs on each device</span>
    <div class="counts">
      <span class="cbadge">iPad <b id="cIpad">0</b></span>
      <span class="cbadge">iPhone <b id="cIphone">0</b></span>
    </div>
  </div>
  <div class="toolbar">
    <input class="search" id="search" type="text" placeholder="Filter features…" autocomplete="off">
    <button class="btn" id="btnExport" type="button">Export</button>
    <button class="btn" id="btnImport" type="button">Import</button>
    <button class="btn" id="btnReset" type="button">Reset</button>
  </div>
  <div class="chips" id="chips">
    <span class="chip on" data-f="all">All</span>
    <span class="chip" data-f="ipad">On iPad</span>
    <span class="chip" data-f="iphone">On iPhone</span>
    <span class="chip" data-f="done"><span class="dot" style="background:var(--good)"></span>Done</span>
    <span class="chip" data-f="soon"><span class="dot" style="background:var(--accent)"></span>Soon</span>
      <span class="chip" data-f="setup"><span class="dot" style="background:var(--gps)"></span>Setup</span>
  </div>
</header>

<div class="colhead">
  <span class="ch-label">Feature</span>
  <span class="ch-col">iPad</span>
  <span class="ch-col">iPhone</span>
</div>

<div class="wrap" id="wrap"></div>

<footer>
  <div class="legend">
    <span class="lg"><span class="st done" style="width:8px;height:8px;border-radius:50%"></span>Done</span>
    <span class="lg"><span class="st soon" style="width:8px;height:8px;border-radius:50%"></span>Soon</span>
      <span class="lg"><span class="tag setup">Setup</span>you set it up</span>
  </div>
  <span class="stamp" id="stamp">Matrix v1 · 2026-07-18</span>
</footer>

<div class="ov" id="ov">
  <div class="ov-win">
    <h3 id="ovTitle">Export</h3>
    <p id="ovMsg"></p>
    <textarea id="ovText" spellcheck="false"></textarea>
    <div class="ov-acts">
      <button class="btn" id="ovCancel" type="button">Close</button>
      <button class="btn" id="ovAction" type="button" style="border-color:var(--accent);color:var(--accent)">Copy</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   NM Plotter — Feature Matrix
   - Status (done/soon/planned) is implementation reality (baked in).
   - iPad / iPhone ticks are Danny's device-inclusion decisions.
   - Ticks persist in localStorage keyed to the origin, NOT in the
     file — so re-shipping this file keeps all previous selections.
     New features arrive with their seed defaults; existing IDs keep
     whatever was saved. Feature IDs are STABLE — never renumber them.
   ============================================================ */
const STORE_KEY = 'nm_feature_matrix_state_v1';
const MATRIX_VER = 'Matrix v1 · 2026-07-18';

/* seed defaults: done features start ticked on both; planned start off.
   User toggles override these and are saved. */
const CATS = [
  { name:'Map & Base Layers', items:[
    { id:'base_pmtiles', name:'Offline vector basemap', status:'done',
      desc:'The built-in PNG vector map (png.pmtiles). Draws with no signal — the core of cockpit offline use.' },
    { id:'base_carto', name:'Online basemap fallback (CARTO dark)', status:'done',
      desc:'Falls back to online CARTO dark tiles when you have signal and the offline map is unavailable.' },
    { id:'lyr_satellite', name:'Satellite imagery layer', status:'done',
      desc:'Toggleable satellite imagery overlay for terrain context.' },
    { id:'lyr_terrain', name:'Terrain elevation shading', status:'done',
      desc:'Coloured terrain elevation over the highlands. Downloaded once on wifi, then works offline.' },
    { id:'win_altitude', name:'"My altitude" terrain window', status:'done',
      desc:'Bottom-left window that reads terrain height against your set altitude. Collapsible.' },
    { id:'lyr_labels', name:'Map labels layer', status:'done',
      desc:'Place and feature labels drawn over the basemap.' },
    { id:'zoom_feel', name:'Fine zoom control', status:'done',
      desc:'Smooth partial-step zoom (zoomSnap 0, tuned wheel/pinch feel).' },
  ]},

  { name:'Navigation Data Layers', items:[
    { id:'lyr_airfields', name:'Airfield dots', status:'done',
      desc:'Aerodrome markers, tappable for the info card.' },
    { id:'lyr_waypoints', name:'My Waypoints', status:'done',
      desc:'Your own saved personal waypoints.' },
    { id:'lyr_navaids', name:'Navaids', status:'done',
      desc:'Published navaids (VOR/NDB/DME) from the PNG AIP.' },
    { id:'lyr_enroute', name:'Enroute Fixes', status:'done',
      desc:'Magenta enroute fixes, searchable in both search bars.' },
    { id:'lyr_procfix', name:'Procedure Fixes (IAF/IF/FAF/MAPT)', status:'done',
      desc:'Lime procedure fixes — 49 across the 5 core fields, standalone toggle, searchable.' },
    { id:'lyr_danger', name:'Danger / Restricted Areas', status:'done',
      desc:'ENR 5.1/5.2 danger and restricted areas. Approximated geometry renders dashed with an advisory note.' },
    { id:'lyr_mbz', name:'MBZ airspace', status:'done',
      desc:'Mandatory Broadcast Zones.' },
    { id:'lyr_training', name:'Training areas', status:'done',
      desc:'Published training areas.' },
    { id:'lyr_adiz', name:'ADIZ', status:'done',
      desc:'Air Defence Identification Zone entries (shown dimmed / reserved).' },
    { id:'lyr_flightcat', name:'Flight Category (METAR)', status:'done',
      desc:'VFR/MVFR/IFR/LIFR rings from live METAR only — every colour is an observed fact, sparse but honest.' },
    { id:'lyr_enr431', name:'ENR 4.3.1 enroute points', status:'soon',
      desc:'A further magenta enroute-points layer from ENR 4.3.1. Backlog.' },
  ]},

  { name:'Labels & Declutter', items:[
    { id:'declutter_chips', name:'Label "Aa" declutter chips', status:'done',
      desc:'Per-layer chips that hide labels/altitudes when zoomed out (Terminal areas, Aerodromes, Enroute Fixes).' },
    { id:'declutter_airfield', name:'Airfield label declutter by zoom', status:'soon',
      desc:'Dots at low zoom, labels fading in as you zoom. Scoped, no blocker — not yet built.' },
  ]},

  { name:'Route Planning', items:[
    { id:'route_coordbox', name:'Coordinate entry box', status:'done',
      desc:'Manual lat/lon entry to build a route row.' },
    { id:'route_autocomplete', name:'Coordinate autocomplete search', status:'done',
      desc:'Sidebar search that inserts a coordinate into the route as you pick.' },
    { id:'route_line', name:'Route line & legs', status:'done',
      desc:'The plotted amber route with per-leg segments.' },
    { id:'route_totals', name:'Distance / heading / totals', status:'done',
      desc:'Per-leg and total distance and heading readouts.' },
    { id:'route_fuel', name:'Fuel calculation', status:'done',
      desc:'Per-leg and total fuel figures across the plan.' },
    { id:'route_directto', name:'Direct-to (from any tap card)', status:'done',
      desc:'Clears the plan → present position → tapped point, fits the map, with a 5-second Undo. Needs a GPS fix.' },
    { id:'route_undo', name:'Undo (route restore)', status:'done',
      desc:'Restores the previous plan (incl. fuel) after a Direct-to.' },
  ]},

  { name:'Search', items:[
    { id:'search_sidebar', name:'Sidebar coordinate search', status:'done',
      desc:'Autocomplete in the coordinates box — picking inserts a coordinate into the route.' },
    { id:'search_map', name:'On-map search bar (fly-to)', status:'done',
      desc:'Search bar above the map — picking pans/zooms the map to the location.' },
  ]},

  { name:'Weather', items:[
    { id:'wx_metar', name:'METAR on tap-cards', status:'done',
      desc:'Live METAR with observation age, fetched via the wx proxy (5-min cache).' },
    { id:'wx_flightcat', name:'Flight Category layer', status:'done',
      desc:'Same METAR-only VFR/MVFR/IFR/LIFR layer listed above, driven from observations.' },
    { id:'wx_point', name:'Point weather forecast', status:'done',
      desc:'Open-Meteo point forecast data. (Confirm scope — mark it as you want it.)' },
  ]},

  { name:'GPS & Position', items:[
    { id:'gps_ppos', name:'Live GPS position (PPOS)', status:'done',
      desc:'Reads the device GPS for present position, used by Direct-to and the coordinate overlay.' },
    { id:'gps_overlay', name:'GPS coordinate overlay', status:'done',
      desc:'Big read-only per-point coordinates (DEP → WPT → ARR), one tab each, opened from the GPS button.' },
    { id:'gps_fmt', name:'DMS ↔ D°M.M′ toggle', status:'done',
      desc:'Switches the overlay between DMS and degrees-decimal-minutes; the choice is remembered.' },
  ]},

  { name:'Charts & Plates', items:[
    { id:'plate_import', name:'Plate import (upload)', status:'done', setup:true,
      desc:'Load your own approach/aerodrome plates (PDF or image) into the app.',
      howto:['Open an airfield card and go to the Charts section.',
             'Use the Charts list to add a file — pick the PDF or image from your device.',
             'It is stored on the device for offline use.'] },
    { id:'plate_georef', name:'Plate georeferencing / calibration', status:'done', setup:true,
      desc:'Calibrate an imported plate so it overlays correctly on the map.',
      howto:['Open the imported plate and enter calibration mode.',
             'Match known points on the plate to their real positions.',
             'Save — a good fit lets the plate be picked as a map overlay.'] },
    { id:'plate_overlay', name:'Plate overlay on map', status:'done',
      desc:'A calibrated plate drawn to scale over the map, framed to its extent on open.' },
    { id:'plate_opacity', name:'Plate opacity control', status:'done',
      desc:'Opacity slider in the plate window.' },
    { id:'plate_switch', name:'Plate switcher dropdown', status:'done',
      desc:'Switch between other calibrated plates at the same airport without reopening.' },
    { id:'plate_window', name:'Collapsible plate window', status:'done',
      desc:'The plate control window collapses on click-away and stacks above the terrain window.' },
    { id:'charts_list', name:'Charts list per airfield', status:'done',
      desc:'Scrollable chart list per field with Airport / Departure / Arrival / Approach / Other tabs, constant height across tabs.' },
  ]},

  { name:'Airfield Info & Frequencies', items:[
    { id:'af_card', name:'Airfield info card', status:'done',
      desc:'Tap-card with field info, runways, frequencies and actions.' },
    { id:'freq_display', name:'Frequency display', status:'done',
      desc:'Published frequencies (initial 15-aerodrome seed from OurAirports).' },
    { id:'freq_edit', name:'Edit frequencies', status:'done',
      desc:'Hand-edit or add frequencies on a field.' },
    { id:'freq_tab', name:'Frequencies tab (proximity match)', status:'soon', setup:true,
      desc:'A dedicated Frequencies tab matching aerodrome/HF frequencies near your plotted route. Data-blocked.',
      howto:['This needs your bush-strip CTAF and en-route HF frequency list.',
             'Supply the list — the JSON model is already approved and the proximity matching is designed.',
             'Once the data lands, the tab is built.'] },
  ]},

  { name:'Export & Output', items:[
    { id:'out_pdf', name:'PDF export of route', status:'done',
      desc:'Export the plan as a PDF.' },
    { id:'out_gps', name:'Export GPS coordinates', status:'done',
      desc:'The GPS coordinate overlay, copyable per point.' },
  ]},

  { name:'Cloud & Library', items:[
    { id:'cloud_routes', name:'Route library (cloud)', status:'done', setup:true,
      desc:'Shared route library stored in the cloud, planned on desktop and pulled to the device.',
      howto:['Routes live in the nmplotter-routes cloud store.',
             'Plan on desktop, then explicitly PULL a route into a local working copy on the iPad.',
             'It downloads as a file — it never live-syncs over a route you are flying.'] },
    { id:'cloud_waypoints', name:'Waypoints collection (cloud)', status:'done', setup:true,
      desc:'Your personal waypoints stored in the cloud alongside routes.',
      howto:['Saved to the same cloud store as routes.',
             'Pull them to the device when you want them locally.'] },
    { id:'cloud_pullonly', name:'Pull-only sync (explicit)', status:'soon', setup:true,
      desc:'One-tap PULL to device — hard rule: never auto-syncs in a way that could overwrite an in-use route mid-flight.',
      howto:['Sync is always pull-only, into a local working copy.',
             'You trigger it explicitly; nothing overwrites your active route on its own.'] },
  ]},

  { name:'App Shell & PWA', items:[
    { id:'app_offline', name:'Offline capability', status:'done',
      desc:'Service worker precaches the app shell so it opens and draws with no signal.' },
    { id:'app_install', name:'Install as an app (Add to Home Screen)', status:'done', setup:true,
      desc:'Runs as a full-screen installed PWA, not just a browser tab.',
      howto:['In Safari, open the share sheet.',
             'Choose Add to Home Screen.',
             'Launch it from the icon for full-screen, offline-ready use.'] },
    { id:'app_settings', name:'Settings panel', status:'done',
      desc:'Settings including corridor width and the build stamp.' },
    { id:'app_buildstamp', name:'Build / version stamp', status:'done',
      desc:'Running version shown at the foot of Settings so you always know what is loaded.' },
    { id:'app_changelog', name:'Changelog', status:'done',
      desc:'In-file change history.' },
  ]},

  { name:'On the Horizon', items:[
    { id:'hz_procwpt', name:'ENR 4.3.2 procedure waypoints', status:'soon',
      desc:'Full IAF/IF/FAF/MAPT set — parked until instrument approach plate data provides safe display context.' },
    { id:'hz_datapacks', name:'Per-region data packs', status:'soon',
      desc:'Downloadable per-country data packs (basemap + terrain + airfields + airspace + freqs). Engine/data separation north star.' },
    { id:'hz_suite', name:'Pilot Tools Suite shell', status:'soon',
      desc:'NM Plotter + Chart Analyst + Weight & Balance under one shell.' },
    { id:'hz_chartanalyst', name:'Chart Analyst (suite)', status:'soon',
      desc:'Companion tool within the suite.' },
    { id:'hz_wb', name:'Weight & Balance (suite)', status:'soon',
      desc:'W&B tool within the suite, feeding Chart Analyst.' },
    { id:'hz_fuelcalc', name:'Standalone Fuel Calculator', status:'soon',
      desc:'Fuel calc reachable on its own and auto-filled from the route.' },
  ]},
];

/* ---- state ---- */
let state = {};        // { id: {ipad,iphone} }
let openRows = {};     // id -> bool (expanded)
let activeFilter = 'all';
let query = '';

function seed(){
  const s = {};
  CATS.forEach(c => c.items.forEach(it => {
    const on = it.status === 'done';
    s[it.id] = { ipad:on, iphone:on };
  }));
  return s;
}
function load(){
  const base = seed();
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw){
      const saved = JSON.parse(raw);
      Object.keys(saved).forEach(id => { if (base[id]) base[id] = saved[id]; });
    }
  } catch(_){}
  state = base;
}
function save(){
  try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(_){}
}

/* ---- filtering ---- */
function passFilter(it){
  const st = state[it.id] || {ipad:false,iphone:false};
  if (query){
    if (it.name.toLowerCase().indexOf(query) === -1) return false;
  }
  switch(activeFilter){
    case 'ipad':    return st.ipad;
    case 'iphone':  return st.iphone;
    case 'done':    return it.status === 'done';
    case 'soon':    return it.status === 'soon';
    case 'planned': return it.status === 'planned';
    case 'setup':   return !!it.setup;
    default:        return true;
  }
}

/* ---- render ---- */
function render(){
  const wrap = document.getElementById('wrap');
  wrap.innerHTML = '';
  let shown = 0;

  CATS.forEach(cat => {
    const items = cat.items.filter(passFilter);
    if (!items.length) return;
    shown += items.length;

    const sec = document.createElement('div');
    sec.className = 'cat';

    const h = document.createElement('div');
    h.className = 'cat-h';
    h.innerHTML = '<span class="cat-name">'+cat.name+'</span>'
                + '<span class="cat-count">'+items.length+'</span>'
                + '<span class="cat-cols"><span></span><span></span></span>';
    sec.appendChild(h);

    items.forEach(it => {
      const st = state[it.id] || {ipad:false,iphone:false};
      const isOpen = !!openRows[it.id];

      const row = document.createElement('div');
      row.className = 'row' + (isOpen?' open':'') + (it.status==='planned'?' is-planned':'');

      const main = document.createElement('div');
      main.className = 'row-main';
      let inner = '<span class="st '+it.status+'"></span>'
                + '<span class="r-name">'+it.name+'</span>';
      if (it.setup) inner += '<span class="tag setup">Setup</span>';
      inner += '<span class="chev">&#9654;</span>';
      main.innerHTML = inner;
      main.addEventListener('click', () => { openRows[it.id] = !openRows[it.id]; render(); });
      row.appendChild(main);

      ['ipad','iphone'].forEach(dev => {
        const cell = document.createElement('div');
        cell.className = 'cell ' + dev;
        const t = document.createElement('button');
        t.type = 'button';
        t.className = 'tick' + (st[dev]?' on':'');
        t.setAttribute('aria-label', it.name+' on '+dev);
        t.addEventListener('click', (e) => {
          e.stopPropagation();
          state[it.id] = state[it.id] || {ipad:false,iphone:false};
          state[it.id][dev] = !state[it.id][dev];
          save(); updateCounts();
          t.classList.toggle('on', state[it.id][dev]);
        });
        cell.appendChild(t);
        row.appendChild(cell);
      });

      sec.appendChild(row);

      const det = document.createElement('div');
      det.className = 'detail';
      let dHtml = '<p>'+it.desc+'</p>';
      if (it.howto){
        dHtml += '<div class="howto"><div class="ht-h">You set this up</div><ol>'
               + it.howto.map(s => '<li>'+s+'</li>').join('') + '</ol></div>';
      }
      det.innerHTML = dHtml;
      sec.appendChild(det);
    });

    wrap.appendChild(sec);
  });

  if (!shown){
    const e = document.createElement('div');
    e.className = 'empty';
    e.textContent = 'No features match.';
    wrap.appendChild(e);
  }
  updateCounts();
}

function updateCounts(){
  let ip=0, iph=0;
  Object.keys(state).forEach(id => { if(state[id].ipad) ip++; if(state[id].iphone) iph++; });
  document.getElementById('cIpad').textContent = ip;
  document.getElementById('cIphone').textContent = iph;
}

/* ---- chips ---- */
document.getElementById('chips').addEventListener('click', e => {
  const chip = e.target.closest('.chip'); if(!chip) return;
  activeFilter = chip.getAttribute('data-f');
  [...document.querySelectorAll('.chip')].forEach(c => c.classList.toggle('on', c===chip));
  render();
});

/* ---- search ---- */
document.getElementById('search').addEventListener('input', e => {
  query = e.target.value.trim().toLowerCase(); render();
});

/* ---- export / import / reset ---- */
const ov = document.getElementById('ov');
const ovTitle = document.getElementById('ovTitle');
const ovMsg = document.getElementById('ovMsg');
const ovText = document.getElementById('ovText');
const ovAction = document.getElementById('ovAction');
let ovMode = 'export';

function openOv(mode){
  ovMode = mode;
  if (mode === 'export'){
    ovTitle.textContent = 'Export selections';
    ovMsg.textContent = 'Copy this and paste it to me — I use it to cross-check and re-seed the file so nothing is lost.';
    ovText.value = JSON.stringify(state, null, 0);
    ovText.readOnly = true;
    ovAction.textContent = 'Copy';
  } else {
    ovTitle.textContent = 'Import selections';
    ovMsg.textContent = 'Paste a previously exported JSON to restore your ticks (e.g. on a new device).';
    ovText.value = '';
    ovText.readOnly = false;
    ovAction.textContent = 'Apply';
  }
  ov.classList.add('on');
}
document.getElementById('btnExport').addEventListener('click', () => openOv('export'));
document.getElementById('btnImport').addEventListener('click', () => openOv('import'));
document.getElementById('ovCancel').addEventListener('click', () => ov.classList.remove('on'));
ov.addEventListener('click', e => { if(e.target===ov) ov.classList.remove('on'); });

ovAction.addEventListener('click', () => {
  if (ovMode === 'export'){
    ovText.select();
    try { navigator.clipboard.writeText(ovText.value); } catch(_){}
    ovAction.textContent = 'Copied';
    setTimeout(()=>{ ovAction.textContent='Copy'; }, 1200);
  } else {
    try {
      const parsed = JSON.parse(ovText.value);
      const base = seed();
      Object.keys(parsed).forEach(id => { if(base[id]) base[id]=parsed[id]; });
      state = base; save(); render(); ov.classList.remove('on');
    } catch(err){
      ovMsg.textContent = 'That did not parse as JSON — check the paste and try again.';
    }
  }
});

document.getElementById('btnReset').addEventListener('click', () => {
  if (confirm('Reset all iPad / iPhone ticks to the file defaults? Your saved selections will be cleared.')){
    try { localStorage.removeItem(STORE_KEY); } catch(_){}
    state = seed(); save(); render();
  }
});

/* ---- init ---- */
document.getElementById('stamp').textContent = MATRIX_VER;
load();
render();
</script>
</body>
</html>
