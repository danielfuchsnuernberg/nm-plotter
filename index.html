          <p className="text-[11px] leading-relaxed">Tick the cabin configurations this airframe is certified to fly. The current config can be switched from the Load tab.</p>
          <div className="space-y-1.5 pt-1">
            {Object.values(CONFIGS).map(c => {
              const avail = editing.availableConfigs || ['charter'];
              const checked = avail.includes(c.id);
              return (
                <label key={c.id} className="flex items-center gap-2 text-sm cursor-pointer">
                  <input
                    type="checkbox"
                    checked={checked}
                    onChange={(e) => {
                      let next = e.target.checked
                        ? [...new Set([...avail, c.id])]
                        : avail.filter(x => x !== c.id);
                      if (next.length === 0) next = ['charter'];  // can't disable everything
                      const newCurrent = next.includes(editing.currentConfig || 'charter')
                        ? (editing.currentConfig || 'charter')
                        : next[0];
                      setEditing({ ...editing, availableConfigs: next, currentConfig: newCurrent });
                    }}
                  />
                  <span>{c.label}</span>
                </label>
              );
            })}
          </div>
        </div>

        {/* Per-config arm overrides — for airframes whose install differs from the default */}
        {(editing.availableConfigs || []).filter(id => id !== 'charter').map(cfgId => {
          const cfg = CONFIGS[cfgId];
          if (!cfg) return null;
          const ovr = editing.configArmOverrides?.[cfgId] || {};
          // Show only cabin slots (skip crew — they're shared across all configs)
          const slotEntries = Object.entries(cfg.slots).filter(([id, s]) => s.group !== 'crew');
          const setOvr = (slotId, field, val) => {
            const next = JSON.parse(JSON.stringify(editing.configArmOverrides || {}));
            if (!next[cfgId]) next[cfgId] = {};
            if (!next[cfgId][slotId]) next[cfgId][slotId] = {};
            if (val === '' || val === null) {
              delete next[cfgId][slotId][field];
              if (Object.keys(next[cfgId][slotId]).length === 0) delete next[cfgId][slotId];
              if (Object.keys(next[cfgId]).length === 0) delete next[cfgId];
            } else {
              next[cfgId][slotId][field] = val;
            }
            setEditing({ ...editing, configArmOverrides: next });
          };
          const resetOverrides = () => {
            const next = { ...(editing.configArmOverrides || {}) };
            delete next[cfgId];
            setEditing({ ...editing, configArmOverrides: next });
          };
          const hasAny = Object.keys(ovr).length > 0;
          return (
            <details key={cfgId} className="efb-panel p-3" style={{ cursor: 'pointer' }}>
              <summary className="efb-caps flex items-center justify-between" style={{ cursor: 'pointer', listStyle: 'none' }}>
                <span>
                  {cfg.label.split(' (')[0]} — Arm Overrides
                  {hasAny && (
                    <span className="efb-mono efb-caps-sm ml-2" style={{ color: 'var(--accent)' }}>· {Object.keys(ovr).length} CUSTOM</span>
                  )}
                </span>
                <span className="efb-caps-sm" style={{ color: 'var(--text-2)' }}>EDIT ▾</span>
              </summary>
              <div className="mt-3 pt-3 space-y-1.5" style={{ borderTop: '1px solid var(--border)' }}>
                <p className="text-[11px] leading-relaxed" style={{ color: 'var(--text-2)' }}>
                  Default arms come from the BK117 manual. Override here for an airframe whose installed seating differs (e.g. military install with re-positioned benches). Blank fields use the default.
                </p>
                <div className="grid items-center gap-1.5" style={{ gridTemplateColumns: 'minmax(0,1fr) 90px 90px' }}>
                  <div className="efb-caps-sm">Slot</div>
                  <div className="efb-caps-sm text-right">Long (mm)</div>
                  <div className="efb-caps-sm text-right">Lat (mm)</div>
                </div>
                {slotEntries.map(([sid, slot]) => {
                  const defLong = slot.longArm, defLat = slot.latArm;
                  const o = ovr[sid] || {};
                  return (
                    <div key={sid} className="grid items-center gap-1.5" style={{ gridTemplateColumns: 'minmax(0,1fr) 90px 90px' }}>
                      <div className="efb-mono" style={{ fontSize: '11px', color: 'var(--text-1)', letterSpacing: '0.05em' }}>
                        {sid.startsWith('pax_') ? `Pax ${sid.replace('pax_', '').toUpperCase()}`
                          : sid === 'stretcher_L' ? 'Stretcher L'
                          : sid === 'stretcher_R' ? 'Stretcher R'
                          : sid === 'baggage' ? 'Baggage'
                          : sid}
                      </div>
                      <input type="number" inputMode="decimal" className="efb-input no-spinner text-right"
                        value={o.longArm ?? ''}
                        placeholder={String(defLong)}
                        onChange={(e) => setOvr(sid, 'longArm', e.target.value === '' ? null : parseFloat(e.target.value))}/>
                      <input type="number" inputMode="decimal" className="efb-input no-spinner text-right"
                        value={o.latArm ?? ''}
                        placeholder={String(defLat)}
                        onChange={(e) => setOvr(sid, 'latArm', e.target.value === '' ? null : parseFloat(e.target.value))}/>
                    </div>
                  );
                })}
                {hasAny && (
                  <button onClick={resetOverrides} className="efb-btn efb-btn-danger mt-2" style={{ alignSelf: 'flex-start' }}>
                    Reset all to defaults
                  </button>
                )}
              </div>
            </details>
          );
        })}
        <div className="efb-panel p-3 space-y-2">
          <h4 className="efb-caps">Doors</h4>
          {Object.entries(editing.doors || {}).map(([k, d]) => (
            <div key={k} className="grid grid-cols-5 gap-2 items-center">
              <label className="flex items-center gap-1 text-xs">
                <input type="checkbox" checked={d.fitted} onChange={(e) => setD(k, 'fitted', e.target.checked)}/>
                {dl[k]}
              </label>
              <NumInput value={d.weight} onChange={(v) => setD(k, 'weight', v)} className="text-xs py-1"/>
              <NumInput value={d.longArm} onChange={(v) => setD(k, 'longArm', v)} className="text-xs py-1"/>
              <NumInput value={d.latArm} onChange={(v) => setD(k, 'latArm', v)} className="text-xs py-1"/>
              <div className="text-[10px] ">kg/lng/lat</div>
            </div>
          ))}
        </div>
        <div className="efb-panel p-3 space-y-2">
          <h4 className="efb-caps">Notes</h4>
          <textarea value={editing.notes || ''} onChange={(e) => setF('notes', e.target.value)} rows={3}
            className="w-full efb-input w-full"/>
        </div>
      </div>
    );
  }

  const del = (id) => {
    if (fleet.length <= 1) { alert('Cannot delete last airframe.'); return; }
    if (!confirm('Delete this airframe?')) return;
    setFleet(prev => prev.filter(a => a.id !== id));
    if (activeId === id) setActiveId(fleet.find(a => a.id !== id).id);
  };

  return (
    <div className="space-y-3">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <h3 className="efb-caps">Fleet</h3>
        <div className="flex items-center gap-1.5 flex-wrap">
          <button onClick={() => {
            // Export the whole fleet as a JSON file the user can save / share
            try {
              const data = JSON.stringify(fleet, null, 2);
              const blob = new Blob([data], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url; a.download = `bk117_fleet_${new Date().toISOString().slice(0,10)}.json`;
              document.body.appendChild(a); a.click(); document.body.removeChild(a);
              setTimeout(() => URL.revokeObjectURL(url), 3000);
            } catch (e) { alert('Export failed: ' + (e?.message || e)); }
          }} className="efb-btn flex items-center gap-1.5" title="Save the fleet to a JSON file">
            <Save size={13}/> Export
          </button>
          <label className="efb-btn flex items-center gap-1.5" style={{ cursor: 'pointer' }} title="Load a fleet from a JSON file">
            <Plus size={13}/> Import
            <input type="file" accept="application/json,.json" style={{ display: 'none' }}
              onChange={(e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                  try {
                    const parsed = JSON.parse(reader.result);
                    if (!Array.isArray(parsed)) throw new Error('File is not a fleet list');
                    // Merge by tail: imported airframes replace same-tail, others are added
                    setFleet(prev => {
                      const byTail = {};
                      prev.forEach(a => { byTail[(a.tail||'').toUpperCase()] = a; });
                      parsed.forEach(a => { if (a && a.tail) byTail[(a.tail||'').toUpperCase()] = a; });
                      return Object.values(byTail);
                    });
                    alert(`Imported ${parsed.length} airframe(s).`);
                  } catch (err) { alert('Import failed: ' + (err?.message || err)); }
                  e.target.value = '';
                };
                reader.readAsText(file);
              }}/>
          </label>
          <button onClick={() => {
            setFleet(prev => {
              const tails = new Set(prev.map(a => a.tail));
              const missing = DEFAULT_FLEET.filter(d => !tails.has(d.tail))
                .map(d => JSON.parse(JSON.stringify(d)));
              return missing.length ? [...prev, ...missing] : prev;
            });
          }} className="efb-btn flex items-center gap-1.5" title="Add any missing default airframes (LAW / COP / ICU)">
            <Copy size={13}/> Restore
          </button>
          <button onClick={newAF} className="efb-btn active flex items-center gap-1.5">
            <Plus size={14}/> New
          </button>
        </div>
      </div>
      {fleet.map(af => (
        <div key={af.id} className="efb-panel p-4" style={{ borderColor: af.id === activeId ? 'var(--accent-dim)' : 'var(--border)' }}>
          <div className="flex items-start justify-between gap-3 flex-wrap">
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="efb-mono" style={{ fontSize: '15px', color: 'var(--text-0)', letterSpacing: '0.05em' }}>{af.tail}</span>
                <span className="efb-caps-sm">{af.variant}</span>
                {af.id === activeId && <span className="efb-caps-sm px-2 py-0.5 rounded" style={{ background: 'var(--accent-bg)', color: 'var(--accent)' }}>ACTIVE</span>}
              </div>
              <div className="mt-2 grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
                <div><span className="">BEW:</span> <span className="font-mono">{af.emptyWeight}</span></div>
                <div><span className="">Long:</span> <span className="font-mono">{af.emptyLongArm}</span></div>
                <div><span className="">Lat:</span> <span className="font-mono">{af.emptyLatArm}</span></div>
                <div><span className="">MaxTOW:</span> <span className="font-mono">{af.maxTOW}</span></div>
              </div>
              {af.notes && <div className="mt-2 efb-caps-sm italic line-clamp-2">{af.notes}</div>}
            </div>
            <div className="flex gap-1">
              {af.id !== activeId && <button onClick={() => setActiveId(af.id)} className="efb-btn text-xs">Select</button>}
              <button onClick={() => setEditing(JSON.parse(JSON.stringify(af)))} className="efb-btn"><Edit3 size={14}/></button>
              <button onClick={() => { const c = JSON.parse(JSON.stringify(af)); c.id = 'af-' + Date.now(); c.tail = af.tail + '-2'; setFleet(prev => [...prev, c]); }}
                      className="efb-btn"><Copy size={14}/></button>
              <button onClick={() => del(af.id)} className="efb-btn efb-btn-danger"><Trash2 size={14}/></button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
};

// ============================================================
// MAIN APP
// ============================================================

function App() {
  const [view, setView] = useState('load');
  const [fleet, setFleet] = useState(DEFAULT_FLEET);
  const [activeId, setActiveId] = useState(DEFAULT_FLEET[0].id);
  const [flight, setFlight] = useState({
    placed: [], mainFuel: 0, lrFuelL: 0, lrFuelR: 0, lrTankFitted: false,
    lrTankL: { installed: false, position: 'fwd' },
    lrTankR: { installed: false, position: 'fwd' },
    doors: {},
  });
  const [loaded, setLoaded] = useState(false);
  const [openChip, setOpenChip] = useState(null);
  const [pendingConfig, setPendingConfig] = useState(null);
  const [pendingClear, setPendingClear] = useState(false);
  const [pdfResult, setPdfResult] = useState(null); // { url, dataUri, fileName }

  useEffect(() => {
    (async () => {
      let f = await load(SKEY_FLEET, DEFAULT_FLEET);
      // Migration: any airframe without availableConfigs gets sensible defaults.
      f = f.map(a => ({
        ...a,
        availableConfigs: a.availableConfigs && a.availableConfigs.length > 0
          ? a.availableConfigs
          : ['charter', 'military', 'medevac'],
        currentConfig: a.currentConfig || 'charter',
      }));
      // Auto-restore any default airframes (P2-LAW / P2-COP / P2-ICU) that are
      // missing from the saved fleet — matched by tail number. This brings back
      // the standard fleet without overwriting the user's existing/edited
      // airframes. (Saved fleets from older sessions only had P2-LAW.)
      const tails = new Set(f.map(a => (a.tail || '').toUpperCase()));
      const missing = DEFAULT_FLEET
        .filter(d => !tails.has((d.tail || '').toUpperCase()))
        .map(d => JSON.parse(JSON.stringify(d)));
      if (missing.length) f = [...f, ...missing];
      setFleet(f);
      if (f.length > 0) setActiveId(f[0].id);
      const s = await load(SKEY_FLIGHT, null);
      if (s?.flight) {
        const af = (f || DEFAULT_FLEET).find(x => x.id === s.activeId) || f[0];
        const cfgId = af?.currentConfig || DEFAULT_CONFIG_ID;
        const cfg = CONFIGS[cfgId] || CONFIGS[DEFAULT_CONFIG_ID];
        const slots = slotsOf(cfg);
        // Resync placed items: valid slots get position refreshed; orphaned
        // items (slotId no longer in this config) get remigrated to the first
        // free slot of their type, or dropped if no free slot exists.
        const validPlaced = [];
        for (const p of (s.flight.placed || [])) {
          if (p.type === 'hook') { validPlaced.push(p); continue; }
          if (p.slotId && slots[p.slotId]) {
            validPlaced.push({ ...p, x: slots[p.slotId].x, y: slots[p.slotId].y });
          } else {
            const newSlot = findFreeSlot(p.type, validPlaced, cfg);
            if (newSlot) {
              validPlaced.push({ ...p, slotId: newSlot, x: slots[newSlot].x, y: slots[newSlot].y });
            }
          }
        }
        setFlight({ ...s.flight, placed: validPlaced });
        if (s.activeId) setActiveId(s.activeId);
      }
      setLoaded(true);
    })();
  }, []);

  useEffect(() => { if (loaded) save(SKEY_FLEET, fleet); }, [fleet, loaded]);
  useEffect(() => { if (loaded) save(SKEY_FLIGHT, { flight, activeId }); }, [flight, activeId, loaded]);

  const airframe = fleet.find(a => a.id === activeId) || fleet[0];
  const cfg = CONFIGS[airframe?.currentConfig || DEFAULT_CONFIG_ID] || CONFIGS[DEFAULT_CONFIG_ID];
  const calc = useMemo(() => calculate(airframe, flight, cfg), [airframe, flight, cfg]);

  if (!airframe || !calc) return <div className="min-h-screen bg-slate-950 text-white flex items-center justify-center">Loading…</div>;

  const totalKg = calc.auWeight ?? 0;
  const maxSkid = airframe.maxSkid ?? 3350;
  const remaining = maxSkid - totalKg;
  const counts = (flight.placed || []).reduce((a, p) => { a[p.type] = (a[p.type] || 0) + 1; return a; }, {});

  // Per-config caps override the default ITEM_TYPES caps
  const cfgCaps = capsOf(cfg);
  const capFor = (type) => cfgCaps[type] ?? ITEM_TYPES[type]?.cap ?? 0;

  // Check if a type has any free slot to land in (so buttons can disable when blocked)
  const hasFreeSlot = (type) => {
    if (type === 'hook') return true;  // hook lives outside the cabin
    return !!findFreeSlot(type, flight.placed || [], cfg);
  };

  const addItem = (type) => {
    if ((counts[type] || 0) >= capFor(type)) return;
    if (type === 'hook') {
      setFlight({
        ...flight,
        placed: [...(flight.placed || []), { id: `hook_${Date.now()}`, type: 'hook', weight: 0 }]
      });
      return;
    }
    // Stretcher spawns unsnapped in the cabin centerline so the user picks L/R
    // by dragging. Until snapped, lateral arm is treated as 0 (centered).
    if (type === 'stretcher') {
      // Use the average Y of the available stretcher slots so it lands in
      // roughly the right spot vertically (config-independent).
      const slots = slotsOf(cfg);
      const sIds = (typeSlotsOf(cfg).stretcher || []);
      const ys = sIds.map(id => slots[id]?.y).filter(Boolean);
      const sy = ys.length ? ys.reduce((a, b) => a + b, 0) / ys.length : 190;
      setFlight({
        ...flight,
        placed: [...(flight.placed || []), {
          id: `stretcher_${Date.now()}_${Math.floor(Math.random() * 1000)}`,
          type: 'stretcher',
          x: 100, y: sy,            // centered laterally, mid stretcher row
          slotId: null,             // unsnapped — drag to L or R to commit
          weight: ITEM_TYPES.stretcher.dw,
        }]
      });
      return;
    }
    const slotId = findFreeSlot(type, flight.placed || [], cfg);
    if (!slotId) return;
    const s = slotsOf(cfg)[slotId];
    setFlight({
      ...flight,
      placed: [...(flight.placed || []), {
        id: `${type}_${Date.now()}_${Math.floor(Math.random() * 1000)}`,
        type, x: s.x, y: s.y, slotId, weight: ITEM_TYPES[type].dw,
      }]
    });
  };

  // Switch cabin config: clear all placed items and update the airframe's currentConfig.
  const switchConfig = (newCfgId) => {
    if (!CONFIGS[newCfgId]) return;
    if (newCfgId === airframe.currentConfig) return;
    const hasItems = (flight.placed || []).length > 0;
    if (hasItems) {
      // Show an in-app modal — browser confirm() can be silently blocked
      // by sandboxed iframes (e.g. when previewing in Claude artifacts).
      setPendingConfig(newCfgId);
      return;
    }
    applyConfigSwitch(newCfgId);
  };

  const applyConfigSwitch = (newCfgId) => {
    setFleet(fleet.map(a => a.id === airframe.id ? { ...a, currentConfig: newCfgId } : a));
    setFlight({ ...flight, placed: [] });
    setPendingConfig(null);
  };

  const clearAll = () => {
    setPendingClear(true);
  };
  const applyClearAll = () => {
    setFlight({ ...flight, placed: [], mainFuel: 0, lrFuelL: 0, lrFuelR: 0 });
    setPendingClear(false);
  };

  // ── Self-contained minimal PDF generator ───────────────────────────────
  // No external library / CDN needed (the artifact sandbox blocks dynamic
  // script loading). Implements just the drawing primitives the load sheet
  // uses, with a jsPDF-compatible surface so the drawing code below is
  // unchanged. Units are millimetres; internally converted to PDF points.
  const makePDF = () => {
    const MM = 72 / 25.4;             // mm → points
    const PH_MM = 297;                // A4 height (for Y flip)
    const pages = [[]];               // array of content-op arrays
    let cur = 0;
    let font = 'helvetica', weight = 'normal', size = 10;
    let fill = [0, 0, 0], draw = [0, 0, 0], lineW = 0.2, dash = null;

    const X = (mm) => (mm * MM).toFixed(2);
    const Y = (mm) => ((PH_MM - mm) * MM).toFixed(2);
    const C = (rgb) => rgb.map(v => (v / 255).toFixed(3)).join(' ');
    const esc = (s) => String(s).replace(/\\/g, '\\\\').replace(/\(/g, '\\(').replace(/\)/g, '\\)');
    const fontRef = () => {
      const bold = weight === 'bold', ital = weight === 'italic';
      if (bold) return 'F2';
      if (ital) return 'F3';
      return 'F1';
    };
    const push = (op) => pages[cur].push(op);

    const api = {
      setFont: (f, w) => { font = f; weight = w || 'normal'; },
      setFontSize: (s) => { size = s; },
      setTextColor: (r, g, b) => { fill = (g === undefined) ? [r, r, r] : [r, g, b]; },
      setDrawColor: (r, g, b) => { draw = (g === undefined) ? [r, r, r] : [r, g, b]; },
      setFillColor: (r, g, b) => { fill = (g === undefined) ? [r, r, r] : [r, g, b]; },
      setLineWidth: (w) => { lineW = w; },
      setLineDashPattern: (arr) => { dash = (arr && arr.length) ? arr : null; },
      addPage: () => { pages.push([]); cur = pages.length - 1; },
      text: (str, x, y, opts) => {
        // Map non-ASCII typographic chars to ASCII — standard Helvetica/WinAnsi
        // lacks glyphs for many of these, and they break byte-length math.
        const ascii = (t) => String(t)
          .replace(/[·•]/g, '-')
          .replace(/[—–]/g, '-')
          .replace(/→/g, '->')
          .replace(/±/g, '+/-')
          .replace(/[""]/g, '"')
          .replace(/['']/g, "'")
          .replace(/…/g, '...')
          .replace(/[^\x00-\x7F]/g, '');
        const lines = ascii(str).split('\n');
        const align = opts && opts.align;
        const maxW = opts && opts.maxWidth;
        lines.forEach((ln, i) => {
          let s = ln;
          // crude maxWidth wrap (char estimate) — only used for notes
          if (maxW) {
            const charW = size * 0.5 / MM; // approx mm per char
            const maxChars = Math.max(8, Math.floor(maxW / charW));
            if (s.length > maxChars) s = s.slice(0, maxChars - 1) + '...';
          }
          const approxW = s.length * size * 0.5; // points
          let tx = parseFloat(X(x));
          if (align === 'right') tx -= approxW;
          else if (align === 'center') tx -= approxW / 2;
          push(`BT /${fontRef()} ${size.toFixed(1)} Tf ${C(fill)} rg ${tx.toFixed(2)} ${Y(y + i * (size * 0.35 / MM))} Td (${esc(s)}) Tj ET`);
        });
      },
      line: (x1, y1, x2, y2) => {
        const d = dash ? `[${dash.map(n => (n * MM).toFixed(2)).join(' ')}] 0 d` : '[] 0 d';
        push(`${d} ${C(draw)} RG ${(lineW * MM).toFixed(2)} w ${X(x1)} ${Y(y1)} m ${X(x2)} ${Y(y2)} l S`);
      },
      rect: (x, y, w, h, style) => {
        const rx = X(x), ry = Y(y + h), rw = (w * MM).toFixed(2), rh = (h * MM).toFixed(2);
        const d = dash ? `[${dash.map(n => (n * MM).toFixed(2)).join(' ')}] 0 d` : '[] 0 d';
        if (style === 'F') push(`${C(fill)} rg ${rx} ${ry} ${rw} ${rh} re f`);
        else push(`${d} ${C(draw)} RG ${(lineW * MM).toFixed(2)} w ${rx} ${ry} ${rw} ${rh} re S`);
      },
      circle: (cx, cy, r, style) => {
        // approximate circle with bezier
        const k = 0.5523, rr = r * MM;
        const x = parseFloat(X(cx)), y = parseFloat(Y(cy));
        const ops = [
          `${(x + rr).toFixed(2)} ${y.toFixed(2)} m`,
          `${(x + rr).toFixed(2)} ${(y + rr * k).toFixed(2)} ${(x + rr * k).toFixed(2)} ${(y + rr).toFixed(2)} ${x.toFixed(2)} ${(y + rr).toFixed(2)} c`,
          `${(x - rr * k).toFixed(2)} ${(y + rr).toFixed(2)} ${(x - rr).toFixed(2)} ${(y + rr * k).toFixed(2)} ${(x - rr).toFixed(2)} ${y.toFixed(2)} c`,
          `${(x - rr).toFixed(2)} ${(y - rr * k).toFixed(2)} ${(x - rr * k).toFixed(2)} ${(y - rr).toFixed(2)} ${x.toFixed(2)} ${(y - rr).toFixed(2)} c`,
          `${(x + rr * k).toFixed(2)} ${(y - rr).toFixed(2)} ${(x + rr).toFixed(2)} ${(y - rr * k).toFixed(2)} ${(x + rr).toFixed(2)} ${y.toFixed(2)} c`,
        ].join(' ');
        if (style === 'F') push(`${C(fill)} rg ${ops} f`);
        else push(`${C(draw)} RG ${ops} S`);
      },
      output: (type) => {
        // Assemble the PDF document
        const objs = [];
        objs.push('<< /Type /Catalog /Pages 2 0 R >>');
        const pageRefs = pages.map((_, i) => `${4 + i * 2} 0 R`).join(' ');
        objs.push(`<< /Type /Pages /Kids [${pageRefs}] /Count ${pages.length} >>`);
        // shared font resources object index 3
        objs.push('<< /Font << /F1 ' + (3 + pages.length * 2 + 1) + ' 0 R /F2 ' + (3 + pages.length * 2 + 2) + ' 0 R /F3 ' + (3 + pages.length * 2 + 3) + ' 0 R >> >>');
        // byte length of a string (PDF /Length and xref offsets must be byte counts)
        const byteLen = (s) => {
          let n = 0;
          for (let i = 0; i < s.length; i++) {
            const c = s.charCodeAt(i);
            if (c < 0x80) n += 1;
            else if (c < 0x800) n += 2;
            else n += 3;
          }
          return n;
        };
        pages.forEach((ops, i) => {
          const content = ops.join('\n');
          const contentObjIdx = 5 + i * 2;
          objs.push(`<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595.28 841.89] /Resources 3 0 R /Contents ${contentObjIdx} 0 R >>`);
          objs.push(`<< /Length ${byteLen(content)} >>\nstream\n${content}\nendstream`);
        });
        objs.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>');
        objs.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>');
        objs.push('<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Oblique >>');

        let pdf = '%PDF-1.4\n';
        const offsets = [];
        objs.forEach((o, i) => {
          offsets.push(byteLen(pdf));
          pdf += `${i + 1} 0 obj\n${o}\nendobj\n`;
        });
        const xrefStart = byteLen(pdf);
        pdf += `xref\n0 ${objs.length + 1}\n0000000000 65535 f \n`;
        offsets.forEach(off => { pdf += String(off).padStart(10, '0') + ' 00000 n \n'; });
        pdf += `trailer\n<< /Size ${objs.length + 1} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`;

        if (type === 'blob') {
          // Encode as UTF-8 bytes so byte offsets match the declared lengths
          const bytes = new TextEncoder().encode(pdf);
          return new Blob([bytes], { type: 'application/pdf' });
        }
        if (type === 'datauristring') return 'data:application/pdf;base64,' + btoa(unescape(encodeURIComponent(pdf)));
        return pdf;
      },
    };
    return api;
  };

  // Build a load sheet PDF and trigger a download. Self-contained — works
  // inside the artifact sandbox with no external library.
  const printLoadSheet = async () => {

    try {
    const slots = slotsOf(cfg);
    const now = new Date();
    const dateStr = now.toLocaleDateString();
    const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const num = (n, d = 0) => (Number.isFinite(n) ? n.toFixed(d) : '—');

    const labelFor = (item) => {
      if (item.type === 'pax') { const t = (item.slotId || '').replace('pax_', '').toUpperCase(); return t ? `Pax ${t}` : 'Pax'; }
      if (item.type === 'pilot') return 'Pilot (P1)';
      if (item.type === 'copilot') return 'Co-pilot (P2)';
      if (item.type === 'stretcher') return 'Patient (Stretcher)';
      if (item.type === 'baggage') return 'Baggage';
      if (item.type === 'hook') return 'External Load (Hook)';
      return ITEM_TYPES[item.type]?.label || item.type;
    };

    const doc = makePDF();
    const PW = 210, M = 16;
    let y = M;

    // ---- Title
    doc.setFont('helvetica', 'bold'); doc.setFontSize(16); doc.setTextColor(20);
    doc.text('Weight & Balance Load Sheet', M, y); y += 6;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10); doc.setTextColor(90);
    doc.text(`${airframe.tail} — ${airframe.variant}  ·  ${cfg.label}`, M, y); y += 7;

    // ---- Meta line
    doc.setDrawColor(210); doc.setLineWidth(0.2);
    doc.line(M, y, PW - M, y); y += 5;
    doc.setFontSize(8.5); doc.setTextColor(110);
    const metaCol = (label, val, x) => {
      doc.setTextColor(150); doc.text(label.toUpperCase(), x, y);
      doc.setTextColor(40); doc.text(val, x, y + 4);
    };
    metaCol('Date', `${dateStr} ${timeStr}`, M);
    metaCol('Basic Empty', `${num(airframe.emptyWeight, 1)} kg`, M + 55);
    metaCol('Max Skid / TOW', `${num(airframe.maxSkid)} / ${num(airframe.maxTOW)} kg`, M + 105);
    metaCol('Fuel', `${num(fuelTotal)} kg`, M + 160);
    y += 11;

    // ---- Military note
    if (cfg.id === 'military') {
      doc.setFillColor(253, 246, 227); doc.setDrawColor(184, 134, 11);
      doc.rect(M, y, PW - 2 * M, 9, 'F');
      doc.setLineWidth(0.6); doc.line(M, y, M, y + 9);
      doc.setTextColor(150, 110, 10); doc.setFontSize(7.5); doc.setFont('helvetica', 'italic');
      doc.text('Note: Military bench arms estimated from iBal row stations. Verify against actual install drawings before operational use.', M + 3, y + 5.5, { maxWidth: PW - 2 * M - 6 });
      doc.setFont('helvetica', 'normal');
      y += 13;
    }

    // ---- Manifest table
    const manifestHead = ['Item', 'Name', 'kg', 'Long\nArm', 'Long\nMom', 'Lat\nArm', 'Lat\nMom'];
    const colX = [M, M + 38, M + 78, M + 96, M + 119, M + 145, M + 168];
    const colR = [false, false, true, true, true, true, true]; // right-align?

    const drawRow = (cells, opts = {}) => {
      const { bold, fill, topLine, botLine, size = 8.5, color = 40 } = opts;
      if (fill) { doc.setFillColor(243); doc.rect(M, y - 3.6, PW - 2 * M, 6, 'F'); }
      doc.setFont('helvetica', bold ? 'bold' : 'normal'); doc.setFontSize(size); doc.setTextColor(color);
      cells.forEach((c, i) => {
        const x = colX[i];
        const rightEdge = (i < colX.length - 1 ? colX[i + 1] : PW - M) - 2;
        doc.text(String(c), colR[i] ? rightEdge : x, y, { align: colR[i] ? 'right' : 'left' });
      });
      if (topLine) { doc.setDrawColor(60); doc.setLineWidth(0.4); doc.line(M, y - 4.5, PW - M, y - 4.5); }
      if (botLine) { doc.setDrawColor(60); doc.setLineWidth(0.4); doc.line(M, y + 1.8, PW - M, y + 1.8); }
      else { doc.setDrawColor(225); doc.setLineWidth(0.15); doc.line(M, y + 1.8, PW - M, y + 1.8); }
      y += 6;
    };

    // section header
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(70);
    doc.text('LOAD MANIFEST', M, y); y += 2;
    doc.setDrawColor(200); doc.setLineWidth(0.2); doc.line(M, y, PW - M, y); y += 5;

    // column headers
    doc.setFont('helvetica', 'bold'); doc.setFontSize(7); doc.setTextColor(120);
    manifestHead.forEach((h, i) => {
      const x = colX[i];
      const rightEdge = (i < colX.length - 1 ? colX[i + 1] : PW - M) - 2;
      const lines = h.split('\n');
      lines.forEach((ln, li) => {
        doc.text(ln, colR[i] ? rightEdge : x, y + li * 3, { align: colR[i] ? 'right' : 'left' });
      });
    });
    y += (manifestHead.some(h => h.includes('\n')) ? 5 : 2) + 2;
    doc.setDrawColor(60); doc.setLineWidth(0.4); doc.line(M, y - 1.5, PW - M, y - 1.5);
    y += 2;

    // Basic empty
    drawRow(['Basic Empty', '', num(airframe.emptyWeight, 1), num(airframe.emptyLongArm),
      num(airframe.emptyWeight * airframe.emptyLongArm / 100), num(airframe.emptyLatArm),
      num(airframe.emptyWeight * airframe.emptyLatArm / 100)]);

    // items
    (flight.placed || []).forEach(p => {
      const wt = parseFloat(p.weight) || 0;
      let longArm = 0, latArm = 0;
      if (p.type === 'hook') { longArm = airframe.hookArm ?? 4500; latArm = airframe.hookLatArm ?? 0; }
      else if (p.slotId && slots[p.slotId]) { const a = armsFor(slots[p.slotId], p.slotId, cfg, airframe); longArm = a.longArm; latArm = a.latArm; }
      // name truncated to fit column
      let nm = (p.name || '');
      if (nm.length > 16) nm = nm.slice(0, 15) + '…';
      drawRow([labelFor(p), nm, num(wt, 1), num(longArm), num(wt * longArm / 100), num(latArm), num(wt * latArm / 100)]);
    });

    // Zero fuel subtotal
    drawRow(['Zero Fuel', '', num(calc.zfWeight, 1), num(calc.zfLongCG, 1),
      num(calc.zfWeight * calc.zfLongCG / 100), num(calc.zfLatCG, 1),
      num(calc.zfWeight * calc.zfLatCG / 100)], { bold: true, topLine: true });

    if (calc.fuelWt > 0) {
      drawRow(['+ Fuel', '', num(calc.fuelWt, 1), '', '', '', '']);
    }

    // All up total
    drawRow(['All Up', '', num(calc.auWeight, 1), num(calc.auLongCG, 1),
      num(calc.auWeight * calc.auLongCG / 100), num(calc.auLatCG, 1),
      num(calc.auWeight * calc.auLatCG / 100)], { bold: true, fill: true, topLine: true, botLine: true });

    y += 8;

    // ---- CG Check
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(70);
    doc.text('CG CHECK', M, y); y += 2;
    doc.setDrawColor(200); doc.setLineWidth(0.2); doc.line(M, y, PW - M, y); y += 5;

    const cgCols = [M, M + 50, M + 90, M + 120, M + 150, M + 178];
    const cgHead = ['Condition', 'Weight kg', 'Long CG', 'Long', 'Lat CG', 'Lat'];
    const cgR = [false, true, true, false, true, false];
    doc.setFont('helvetica', 'bold'); doc.setFontSize(7); doc.setTextColor(120);
    cgHead.forEach((h, i) => {
      const x = cgCols[i];
      const rightEdge = (i < cgCols.length - 1 ? cgCols[i + 1] : PW - M) - 2;
      doc.text(h, cgR[i] ? rightEdge : x, y, { align: cgR[i] ? 'right' : 'left' });
    });
    y += 2; doc.setDrawColor(60); doc.setLineWidth(0.4); doc.line(M, y, PW - M, y); y += 5;

    const cgRow = (label, w, longCG, latCG, longLim, latLim) => {
      if (!(w > 0)) return;
      const status = (cg, lim, k1, k2) => !lim ? '—' : (cg >= (lim[k1] ?? -1e9) && cg <= (lim[k2] ?? 1e9) ? 'IN' : 'OUT');
      const ls = status(longCG, longLim, 'fwd', 'aft');
      const as = status(latCG, latLim, 'left', 'right');
      const cells = [label, num(w, 1), num(longCG, 1), ls, num(latCG, 1), as];
      doc.setFont('helvetica', 'normal'); doc.setFontSize(8.5);
      cells.forEach((c, i) => {
        const x = cgCols[i];
        const rightEdge = (i < cgCols.length - 1 ? cgCols[i + 1] : PW - M) - 2;
        // color status cells
        if (i === 3) doc.setTextColor(ls === 'OUT' ? 192 : 42, ls === 'OUT' ? 57 : 125, ls === 'OUT' ? 43 : 42);
        else if (i === 5) doc.setTextColor(as === 'OUT' ? 192 : 42, as === 'OUT' ? 57 : 125, as === 'OUT' ? 43 : 42);
        else doc.setTextColor(40);
        if (i === 3 || i === 5) doc.setFont('helvetica', 'bold'); else doc.setFont('helvetica', 'normal');
        doc.text(String(c), cgR[i] ? rightEdge : x, y, { align: cgR[i] ? 'right' : 'left' });
      });
      doc.setDrawColor(225); doc.setLineWidth(0.15); doc.line(M, y + 1.8, PW - M, y + 1.8);
      y += 6;
    };
    cgRow('Zero Fuel', calc.zfWeight, calc.zfLongCG, calc.zfLatCG, calc.zfLongLim, calc.zfLatLim);
    cgRow('Mid Fuel', calc.midWeight, calc.midLongCG, calc.midLatCG, null, null);
    cgRow('All Up', calc.auWeight, calc.auLongCG, calc.auLatCG, calc.auLongLim, calc.auLatLim);

    y += 4;
    // status
    doc.setFontSize(9); doc.setFont('helvetica', 'bold');
    if (calc.warnings.length) {
      doc.setTextColor(192, 57, 43);
      doc.text('Warnings: ' + calc.warnings.join('  ·  '), M, y, { maxWidth: PW - 2 * M });
    } else {
      doc.setTextColor(42, 125, 42);
      doc.text('Within all limits', M, y);
    }
    y += 16;

    // ---- CG Envelope Plots (longitudinal + lateral, side by side)
    // Page-break if not enough room for the plots + legend + signature (~95mm)
    if (y > 297 - 16 - 95) { doc.addPage(); y = M; }
    doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(70);
    doc.text('CG ENVELOPE', M, y); y += 2;
    doc.setDrawColor(200); doc.setLineWidth(0.2); doc.line(M, y, PW - M, y); y += 4;

    const drawEnvPlot = (px, py, pw, ph, axis) => {
      const isLong = axis === 'long';
      const xMin = isLong ? 4300 : -150, xMax = isLong ? 4700 : 150;
      const yMin = 1600, yMax = 3600;
      const sx = (v) => px + ((v - xMin) / (xMax - xMin)) * pw;
      const sy = (v) => py + ph - ((v - yMin) / (yMax - yMin)) * ph;

      doc.setDrawColor(180); doc.setLineWidth(0.3);
      doc.rect(px, py, pw, ph);
      doc.setFont('helvetica', 'bold'); doc.setFontSize(7.5); doc.setTextColor(80);
      doc.text(isLong ? 'Longitudinal (mm)' : 'Lateral (mm)', px, py - 1.5);

      doc.setFontSize(6); doc.setTextColor(150); doc.setFont('helvetica', 'normal');
      [1700, 2400, 3000, 3500].forEach(w => {
        const yy = sy(w);
        doc.setDrawColor(230); doc.setLineWidth(0.1); doc.line(px, yy, px + pw, yy);
        doc.text(String(w), px - 1, yy + 1, { align: 'right' });
      });
      const xticks = isLong ? [4300, 4400, 4500, 4600, 4700] : [-100, -50, 0, 50, 100];
      xticks.forEach(t => {
        const xx = sx(t);
        doc.setDrawColor(235); doc.setLineWidth(0.1); doc.line(xx, py, xx, py + ph);
        doc.text(String(t), xx, py + ph + 3, { align: 'center' });
      });

      const env = isLong ? LONG_ENV : LAT_ENV;
      const k1 = isLong ? 'fwd' : 'left', k2 = isLong ? 'aft' : 'right';
      const pts = [];
      env.forEach(p => pts.push([sx(p[k1]), sy(p.w)]));
      [...env].reverse().forEach(p => pts.push([sx(p[k2]), sy(p.w)]));
      doc.setDrawColor(110, 180, 130); doc.setLineWidth(0.5);
      for (let i = 0; i < pts.length; i++) {
        const a = pts[i], b = pts[(i + 1) % pts.length];
        doc.line(a[0], a[1], b[0], b[1]);
      }

      const maxTOW = airframe.maxTOW ?? 3500, maxSkid = airframe.maxSkid ?? 3350;
      doc.setDrawColor(227, 107, 107); doc.setLineWidth(0.3);
      doc.setLineDashPattern([1, 1], 0);
      doc.line(px, sy(maxTOW), px + pw, sy(maxTOW));
      if (isLong) { doc.setDrawColor(232, 179, 65); doc.line(px, sy(maxSkid), px + pw, sy(maxSkid)); }
      doc.setLineDashPattern([], 0);

      const points = [
        { w: calc.zfWeight,  cg: isLong ? calc.zfLongCG : calc.zfLatCG,  rgb: [95, 182, 228], label: 'ZF' },
        { w: calc.midWeight, cg: isLong ? calc.midLongCG : calc.midLatCG, rgb: [120, 120, 130], label: 'MID' },
        { w: calc.auWeight,  cg: isLong ? calc.auLongCG : calc.auLatCG,  rgb: [232, 179, 65], label: 'AU' },
      ].filter(p => (p.w ?? 0) > 0);
      if (points.length > 1) {
        doc.setDrawColor(150); doc.setLineWidth(0.2); doc.setLineDashPattern([0.8, 0.8], 0);
        for (let i = 0; i < points.length - 1; i++) {
          doc.line(sx(points[i].cg), sy(points[i].w), sx(points[i + 1].cg), sy(points[i + 1].w));
        }
        doc.setLineDashPattern([], 0);
      }
      points.forEach(p => {
        doc.setFillColor(p.rgb[0], p.rgb[1], p.rgb[2]);
        doc.circle(sx(p.cg), sy(p.w), 1.1, 'F');
        doc.setFontSize(6); doc.setTextColor(p.rgb[0], p.rgb[1], p.rgb[2]); doc.setFont('helvetica', 'bold');
        doc.text(p.label, sx(p.cg) + 1.8, sy(p.w) + 1);
      });
    };

    const plotW = (PW - 2 * M - 14) / 2;
    const plotH = 46;
    const plotY = y + 3;
    drawEnvPlot(M + 6, plotY, plotW - 6, plotH, 'long');
    drawEnvPlot(M + plotW + 14, plotY, plotW - 6, plotH, 'lat');
    y = plotY + plotH + 10;

    doc.setFontSize(6.5); doc.setFont('helvetica', 'normal'); doc.setTextColor(120);
    doc.text('Green = approved envelope · Red dash = Max TOW · Amber dash = Max Skid · Dots = ZF / Mid / All-Up loading', M, y);
    y += 10;

    // ---- Signature block
    doc.setDrawColor(60); doc.setLineWidth(0.3);
    const sigW = (PW - 2 * M - 12) / 2;
    doc.line(M, y, M + sigW, y);
    doc.line(M + sigW + 12, y, PW - M, y);
    doc.setFontSize(7.5); doc.setTextColor(120); doc.setFont('helvetica', 'normal');
    doc.text('PILOT IN COMMAND — SIGNATURE', M, y + 4);
    doc.text('DATE', M + sigW + 12, y + 4);

    // ---- Footer
    doc.setFontSize(7); doc.setTextColor(160);
    doc.text(`Generated ${dateStr} ${timeStr}  ·  BK117 W&B  ·  Verify against the approved AFM before flight.`,
      PW / 2, 285, { align: 'center' });

    const fileName = `LoadSheet_${airframe.tail}_${now.toISOString().slice(0, 10)}.pdf`;
    // Generate the PDF, then present it in an in-app modal with a user-clickable
    // download link + inline preview. This is the most reliable delivery inside
    // a sandboxed iframe, where programmatic downloads and pop-ups are blocked.
    const blob = doc.output('blob');
    const dataUri = doc.output('datauristring');
    let url = null;
    try { url = URL.createObjectURL(blob); } catch {}
    setPdfResult({ url, dataUri, fileName });

    // Also attempt a direct download (works where the sandbox allows it).
    try {
      const a = document.createElement('a');
      a.href = url || dataUri;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    } catch {}
    } catch (err) {
      console.error('PDF generation failed:', err);
      alert('PDF generation failed: ' + (err?.message || 'unknown error'));
    }
  };

  const fuelTotal = (parseFloat(flight.mainFuel)||0) + (parseFloat(flight.lrFuelL)||0) + (parseFloat(flight.lrFuelR)||0);
  const doorsOn = Object.entries(airframe.doors || {}).filter(([k, d]) => (flight.doors?.[k] ?? d.fitted)).length;
  const doorsTotal = Object.keys(airframe.doors || {}).length;

  return (
    <div className="min-h-screen text-slate-100" style={{ background: 'var(--bg-0)' }}>
      <style>{`
        :root {
          --bg-0: #0b0f14;
          --bg-1: #11171f;
          --bg-2: #161e28;
          --bg-3: #1d2632;
          --border: #232c39;
          --border-strong: #2e3a4a;
          --text-0: #e7ecf2;
          --text-1: #a7b1bf;
          --text-2: #6b7686;
          --text-3: #4a5363;
          --accent: #5fb6e4;
          --accent-dim: #2a5f7d;
          --accent-bg: #133247;
          --warn: #e8b341;
          --alert: #e36b6b;
          --ok: #6ec78a;
          --patient: #d97757;
          --mono: ui-monospace, 'SF Mono', 'JetBrains Mono', 'Roboto Mono', Menlo, monospace;
        }
        body { background: var(--bg-0); }

        input.no-spinner::-webkit-outer-spin-button,
        input.no-spinner::-webkit-inner-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
        input.no-spinner { -moz-appearance: textfield; }

        /* utility classes mapped to tokens for use across the app */
        .efb-mono { font-family: var(--mono); }
        .efb-caps { text-transform: uppercase; letter-spacing: 0.1em; font-size: 10.5px; font-weight: 500; color: var(--text-2); }
        .efb-caps-sm { text-transform: uppercase; letter-spacing: 0.14em; font-size: 9.5px; font-weight: 500; color: var(--text-2); }
        .efb-panel { background: var(--bg-1); border: 1px solid var(--border); border-radius: 4px; }
        .efb-panel-2 { background: var(--bg-2); border: 1px solid var(--border); border-radius: 4px; }
        .efb-hairline { border-color: var(--border); }
        .efb-input {
          background: var(--bg-2); border: 1px solid var(--border); border-radius: 3px;
          padding: 5px 8px; color: var(--text-0); font-family: var(--mono); font-size: 12px;
          outline: none; transition: border-color 0.12s;
        }
        .efb-input:focus { border-color: var(--accent); }
        .efb-btn {
          background: var(--bg-2); border: 1px solid var(--border); border-radius: 3px;
          color: var(--text-1); padding: 6px 10px; font-size: 11.5px; cursor: pointer;
          transition: background 0.12s, color 0.12s;
          letter-spacing: 0.06em;
        }
        .efb-btn:hover { background: var(--bg-3); color: var(--text-0); }
        .efb-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-dim); }
        .efb-btn-danger { color: var(--alert); }
        .efb-btn-danger:hover { background: rgba(227,107,107,0.08); color: var(--alert); }
      `}</style>
      {/* Header */}
      <div className="sticky top-0 z-30" style={{ background: 'var(--bg-0)', borderBottom: '1px solid var(--border)' }}>
        <div className="max-w-6xl mx-auto px-4 py-2.5 flex items-center justify-between flex-wrap gap-3">
          <div className="flex items-center gap-3">
            <Helicopter size={20} style={{ color: 'var(--text-2)' }}/>
            <AircraftPicker fleet={fleet} activeId={activeId} setActiveId={setActiveId}/>
          </div>
          <div className="flex items-center gap-3">
            <button onClick={() => { try { printLoadSheet().catch(e => { console.error(e); alert('Export failed: ' + (e?.message || e)); }); } catch (e) { console.error(e); alert('Export failed: ' + (e?.message || e)); } }}
              className="efb-btn flex items-center gap-1.5"
              title="Export / print load sheet as PDF">
              <Save size={13}/>
              <span className="efb-caps-sm" style={{ letterSpacing: '0.08em' }}>Export PDF</span>
            </button>
            <div className="text-right">
              <div className="efb-mono" style={{
                fontSize: '20px', fontWeight: 500,
                color: calc.warnings.length > 0 ? 'var(--alert)' : 'var(--accent)',
                letterSpacing: '0.01em',
              }}>
                {totalKg.toFixed(1)}<span className="efb-caps-sm ml-1" style={{ color: 'var(--text-2)' }}>KG</span>
              </div>
              <div className="efb-mono" style={{ fontSize: '10.5px', color: calc.warnings.length > 0 ? 'var(--alert)' : 'var(--text-2)', letterSpacing: '0.04em' }}>
                {calc.warnings.length === 0
                  ? `${remaining.toFixed(0)} KG TO MAX SKID`
                  : calc.warnings[0].toUpperCase()}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="sticky z-20" style={{ top: '57px', background: 'var(--bg-0)', borderBottom: '1px solid var(--border)' }}>
        <div className="max-w-6xl mx-auto px-4 flex gap-0 overflow-x-auto">
          {['load','cg','data','fleet'].map(t => {
            const active = view === t;
            return (
              <button key={t} onClick={() => setView(t)}
                className="py-2.5 px-4 efb-caps whitespace-nowrap transition-colors"
                style={{
                  borderBottom: '2px solid ' + (active ? 'var(--accent)' : 'transparent'),
                  color: active ? 'var(--accent)' : 'var(--text-2)',
                  background: 'transparent',
                  cursor: 'pointer',
                }}>
                {t === 'load' ? 'Load' : t === 'cg' ? 'CG' : t === 'data' ? 'Data' : 'Fleet'}
              </button>
            );
          })}
        </div>
      </div>

      <div className="max-w-6xl mx-auto p-3">
        {view === 'load' && (
          <div className="grid grid-cols-2 gap-3 items-start">

            {/* LEFT COLUMN — controls + readouts */}
            <div className="space-y-2.5 min-w-0">

              {/* Cabin config switcher (only shown if airframe supports multiple configs) */}
              {(airframe.availableConfigs || []).length > 1 && (
                <div className="efb-panel flex" style={{ overflow: 'hidden' }}>
                  {(airframe.availableConfigs || []).map((cfgId, i, arr) => {
                    const c = CONFIGS[cfgId];
                    if (!c) return null;
                    const active = cfg.id === cfgId;
                    const short = cfgId === 'charter' ? 'Charter' : cfgId === 'military' ? 'Military' : 'MedEvac';
                    return (
                      <button key={cfgId} onClick={() => switchConfig(cfgId)}
                        className="flex-1 py-2.5 efb-caps transition-colors"
                        style={{
                          background: active ? 'var(--accent-bg)' : 'transparent',
                          color: active ? 'var(--accent)' : 'var(--text-1)',
                          border: 'none',
                          borderRight: i < arr.length - 1 ? '1px solid var(--border)' : 'none',
                          cursor: 'pointer',
                        }}>
                        {short}
                      </button>
                    );
                  })}
                </div>
              )}

              {/* Unverified arms warning — shown when Military is active since
                  the bench arms are estimated from iBal row stations rather
                  than measured from actual install drawings. */}
              {cfg.id === 'military' && (
                <div className="efb-panel" style={{ borderLeft: '2px solid var(--warn)', padding: '8px 10px' }}>
                  <div className="flex items-start gap-2">
                    <AlertTriangle size={13} style={{ color: 'var(--warn)', marginTop: '1px', flexShrink: 0 }}/>
                    <div className="efb-caps-sm" style={{ color: 'var(--warn)', letterSpacing: '0.06em', lineHeight: 1.4 }}>
                      Military bench arms estimated. Verify against install drawings before signing.
                    </div>
                  </div>
                </div>
              )}

              {/* Palette: 3x2 grid */}
              <div className="grid grid-cols-3 efb-panel" style={{ gap: '1px', background: 'var(--border)', overflow: 'hidden' }}>
                <PalBtn icon="pilot"     label="P1"     onClick={() => addItem('pilot')}     count={counts.pilot}     disabled={(counts.pilot || 0)   >= 1}/>
                <PalBtn icon="pilot"     label="P2"     onClick={() => addItem('copilot')}   count={counts.copilot}   disabled={(counts.copilot || 0) >= 1}/>
                <PalBtn icon="pax"       label="Pax"    onClick={() => addItem('pax')}       count={counts.pax}       disabled={capFor('pax') === 0       || (counts.pax || 0)       >= capFor('pax')       || !hasFreeSlot('pax')}/>
                <PalBtn icon="stretcher" label="Strchr" onClick={() => addItem('stretcher')} count={counts.stretcher} disabled={capFor('stretcher') === 0 || (counts.stretcher || 0) >= capFor('stretcher') || !hasFreeSlot('stretcher')}/>
                <PalBtn icon="baggage"   label="Bag"    onClick={() => addItem('baggage')}   count={counts.baggage}   disabled={capFor('baggage') === 0   || (counts.baggage || 0)   >= capFor('baggage')   || !hasFreeSlot('baggage')}/>
                <PalBtn icon="hook"      label="Hook"   onClick={() => addItem('hook')}      count={counts.hook}      disabled={(counts.hook || 0) >= 1}/>
              </div>

              {/* Weight summary */}
              <div className="efb-panel">
                <div className="flex items-baseline justify-between px-3 py-1.5" style={{ borderBottom: '1px solid var(--border)' }}>
                  <span className="efb-caps">Weight Summary</span>
                  <span className="efb-mono" style={{ fontSize: '10.5px', color: 'var(--text-2)' }}>
                    MAX {airframe.maxSkid} KG · MIN {airframe.minTOW} KG
                  </span>
                </div>
                <div className="grid grid-cols-3">
                  {[
                    { l: 'Zero Fuel', v: calc.zfWeight },
                    { l: 'Mid Fuel',  v: calc.midWeight },
                    { l: 'All Up',    v: calc.auWeight },
                  ].map((s, i) => (
                    <div key={i} className="px-3 py-2" style={{ borderRight: i < 2 ? '1px solid var(--border)' : 'none' }}>
                      <div className="efb-caps-sm mb-1">{s.l}</div>
                      <div className="efb-mono" style={{ fontSize: '16px', fontWeight: 500, color: 'var(--text-0)' }}>
                        {s.v.toFixed(0)}<span className="efb-caps-sm ml-1" style={{ color: 'var(--text-2)' }}>KG</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {counts.hook > 0 && <HookCard flight={flight} setFlight={setFlight}/>}

              {/* Fuel + Doors */}
              <div className="grid grid-cols-2 efb-panel" style={{ gap: '1px', background: 'var(--border)', overflow: 'hidden' }}>
                <div className="flex items-center justify-between px-3 py-2.5" style={{ background: 'var(--bg-1)' }}>
                  <span className="efb-caps flex items-center gap-2">
                    <Icon name="fuel" size={14} color="var(--text-2)"/> Fuel
                  </span>
                  <InlineNum value={flight.mainFuel} onChange={(v) => setFlight({ ...flight, mainFuel: v })} suffix="KG"/>
                </div>
                <button onClick={() => setOpenChip(openChip === 'doors' ? null : 'doors')}
                  className="flex items-center justify-between px-3 py-2.5 transition-colors"
                  style={{ background: openChip === 'doors' ? 'var(--bg-2)' : 'var(--bg-1)', border: 'none', cursor: 'pointer' }}>
                  <span className="efb-caps flex items-center gap-2">
                    <Icon name="door" size={14} color="var(--text-2)"/> Doors
                  </span>
                  <span className="efb-mono" style={{ fontSize: '12px', color: 'var(--text-0)' }}>{doorsOn} / {doorsTotal}</span>
                </button>
              </div>
              {airframe.lrTankSystem !== 'none' && (
                <FuelPanel airframe={airframe} flight={flight} setFlight={setFlight} lrOnly/>
              )}
              {openChip === 'doors' && <DoorsPanel airframe={airframe} flight={flight} setFlight={setFlight}/>}

              {/* Status */}
              {calc.warnings.length > 0 ? (
                <div className="efb-panel" style={{ borderLeft: '2px solid var(--alert)' }}>
                  <div className="px-3 py-2 flex items-start gap-2">
                    <AlertTriangle size={14} style={{ color: 'var(--alert)', marginTop: '2px' }}/>
                    <div className="space-y-1">
                      {calc.warnings.map((w, i) => (
                        <div key={i} className="efb-caps" style={{ color: 'var(--alert)', letterSpacing: '0.06em' }}>{w}</div>
                      ))}
                    </div>
                  </div>
                </div>
              ) : totalKg > 100 ? (
                <div className="efb-panel flex items-center gap-2 px-3 py-2" style={{ borderLeft: '2px solid var(--ok)' }}>
                  <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: 'var(--ok)' }}/>
                  <span className="efb-caps" style={{ color: 'var(--ok)' }}>Within All Limits</span>
                </div>
              ) : null}

              {(flight.placed || []).length > 0 && (
                <button onClick={clearAll}
                  className="w-full py-2 efb-caps efb-btn-danger transition-colors"
                  style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--text-3)' }}
                  onMouseEnter={(e) => e.currentTarget.style.color = 'var(--alert)'}
                  onMouseLeave={(e) => e.currentTarget.style.color = 'var(--text-3)'}>
                  Clear All Items
                </button>
              )}
            </div>

            {/* RIGHT COLUMN — cabin diagram */}
            <div className="min-w-0 sticky top-24">
              <div className="efb-panel" style={{ padding: '14px' }}>
                <div className="flex items-baseline justify-between pb-2 mb-2" style={{ borderBottom: '1px solid var(--border)' }}>
                  <span className="efb-caps">Cabin Layout — {cfg.label.split(' (')[0]}</span>
                  <span className="efb-mono" style={{ fontSize: '10.5px', color: 'var(--text-2)' }}>FS 2867 → 5494 MM</span>
                </div>
                <Cabin flight={flight} setFlight={setFlight} cfg={cfg}/>
              </div>
            </div>

          </div>
        )}

        {view === 'cg' && <CGView calc={calc} airframe={airframe}/>}
        {view === 'data' && <DataView airframe={airframe} calc={calc} flight={flight} setFlight={setFlight} cfg={cfg}/>}
        {view === 'fleet' && <FleetView fleet={fleet} setFleet={setFleet} activeId={activeId} setActiveId={setActiveId}/>}
      </div>

      {/* Config switch confirmation modal */}
      {pendingConfig && CONFIGS[pendingConfig] && (
        <div
          onClick={() => setPendingConfig(null)}
          style={{
            position: 'fixed', inset: 0, zIndex: 100,
            background: 'rgba(0,0,0,0.55)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: '20px',
            backdropFilter: 'blur(2px)',
          }}>
          <div
            onClick={(e) => e.stopPropagation()}
            className="efb-panel"
            style={{ maxWidth: '420px', width: '100%', padding: '20px' }}>
            <div className="efb-caps mb-3" style={{ color: 'var(--text-0)', fontSize: '12px' }}>
              Switch Cabin Configuration
            </div>
            <div style={{ fontSize: '13px', color: 'var(--text-1)', lineHeight: 1.5, marginBottom: '16px' }}>
              Switch to <span className="efb-mono" style={{ color: 'var(--accent)' }}>{CONFIGS[pendingConfig].label}</span>?
              <br/><br/>
              <span style={{ color: 'var(--text-2)' }}>
                This will clear all items currently placed in the cabin. Fuel and door settings will be preserved.
              </span>
            </div>
            <div className="flex gap-2 justify-end">
              <button onClick={() => setPendingConfig(null)} className="efb-btn">Cancel</button>
              <button onClick={() => applyConfigSwitch(pendingConfig)} className="efb-btn active">Switch</button>
            </div>
          </div>
        </div>
      )}

      {/* Clear all confirmation modal */}
      {pendingClear && (
        <div
          onClick={() => setPendingClear(false)}
          style={{
            position: 'fixed', inset: 0, zIndex: 100,
            background: 'rgba(0,0,0,0.55)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: '20px',
            backdropFilter: 'blur(2px)',
          }}>
          <div
            onClick={(e) => e.stopPropagation()}
            className="efb-panel"
            style={{ maxWidth: '420px', width: '100%', padding: '20px' }}>
            <div className="efb-caps mb-3" style={{ color: 'var(--text-0)', fontSize: '12px' }}>
              Clear All Items
            </div>
            <div style={{ fontSize: '13px', color: 'var(--text-1)', lineHeight: 1.5, marginBottom: '16px' }}>
              <span style={{ color: 'var(--text-2)' }}>
                Remove all placed items and reset fuel to zero. Doors and aircraft selection are preserved.
              </span>
            </div>
            <div className="flex gap-2 justify-end">
              <button onClick={() => setPendingClear(false)} className="efb-btn">Cancel</button>
              <button onClick={applyClearAll} className="efb-btn" style={{ borderColor: 'var(--alert)', color: 'var(--alert)' }}>Clear All</button>
            </div>
          </div>
        </div>
      )}

      {/* PDF export result modal */}
      {pdfResult && (
        <div
          onClick={() => { if (pdfResult.url) { try { URL.revokeObjectURL(pdfResult.url); } catch {} } setPdfResult(null); }}
          style={{
            position: 'fixed', inset: 0, zIndex: 100,
            background: 'rgba(0,0,0,0.6)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            padding: '20px', backdropFilter: 'blur(2px)',
          }}>
          <div onClick={(e) => e.stopPropagation()} className="efb-panel"
               style={{ maxWidth: '420px', width: '100%', padding: '20px' }}>
            <div className="flex items-center justify-between mb-3">
              <span className="efb-caps" style={{ color: 'var(--text-0)', fontSize: '12px' }}>Load Sheet Ready</span>
              <button onClick={() => { if (pdfResult.url) { try { URL.revokeObjectURL(pdfResult.url); } catch {} } setPdfResult(null); }}
                      className="efb-btn" style={{ padding: '4px 8px' }}><X size={14}/></button>
            </div>
            <div style={{ fontSize: '13px', color: 'var(--text-1)', lineHeight: 1.5, marginBottom: '14px' }}>
              Your load sheet PDF has been generated. Tap below to save or view it.
            </div>
            <div className="flex gap-2 mb-3">
              <a href={pdfResult.url || pdfResult.dataUri} download={pdfResult.fileName}
                 className="efb-btn active flex items-center gap-1.5" style={{ textDecoration: 'none' }}>
                <Save size={14}/> Download PDF
              </a>
              <a href={pdfResult.dataUri} target="_blank" rel="noopener noreferrer"
                 className="efb-btn flex items-center gap-1.5" style={{ textDecoration: 'none' }}>
                Open / Preview
              </a>
            </div>
            <div className="efb-mono efb-caps-sm" style={{ color: 'var(--text-3)' }}>{pdfResult.fileName}</div>
          </div>
        </div>
      )}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
