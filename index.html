// Look up the actual arms for a slot, applying per-airframe overrides if
// present. Each airframe can store configArmOverrides[configId][slotId] = {
// longArm, latArm } to replace the config's defaults. This matters for
// configs like Military where different airframes (e.g. P2-LAW vs P2-COP)
// have physically different installations with different bench positions.
const armsFor = (slot, slotId, cfg, airframe) => {
  const ovr = airframe?.configArmOverrides?.[cfg?.id]?.[slotId];
  return {
    longArm: ovr?.longArm ?? slot.longArm,
    latArm:  ovr?.latArm  ?? slot.latArm,
  };
};

// Fuel arm lookup (mm at given mass kg)
const FUEL_TABLE = [
  [70,4798],[80,4759],[100,4690],[120,4658],[140,4635],[160,4619],[180,4608],[200,4600],
  [240,4589],[280,4581],[320,4575],[360,4571],[400,4567],[440,4565],[480,4562],
];
const fuelArm = (m) => {
  if (m <= 0) return 4798;
  if (m >= 480) return 4562;
  for (let i = 0; i < FUEL_TABLE.length - 1; i++) {
    const [m1, a1] = FUEL_TABLE[i], [m2, a2] = FUEL_TABLE[i+1];
    if (m >= m1 && m <= m2) return a1 + ((a2 - a1) * (m - m1)) / (m2 - m1);
  }
  return 4600;
};

const interp = (env, w, k1, k2) => {
  const s = [...env].sort((a, b) => a.w - b.w);
  if (w <= s[0].w) return { [k1]: s[0][k1], [k2]: s[0][k2] };
  if (w >= s[s.length-1].w) return { [k1]: s[s.length-1][k1], [k2]: s[s.length-1][k2] };
  for (let i = 0; i < s.length - 1; i++) {
    if (w >= s[i].w && w <= s[i+1].w) {
      const t = (w - s[i].w) / (s[i+1].w - s[i].w);
      return { [k1]: s[i][k1] + t*(s[i+1][k1]-s[i][k1]), [k2]: s[i][k2] + t*(s[i+1][k2]-s[i][k2]) };
    }
  }
  return { [k1]: 0, [k2]: 0 };
};

        <rect x="6" y="3" width="12" height="18" stroke={s} strokeWidth={sw}/>
        <circle cx="15" cy="12" r="0.8" fill={s}/>
      </svg>
    );
    default: return null;
  }
};

// ============================================================
// CALCULATION
// ============================================================

const calculate = (af, fl, cfg) => {
  if (!af) return null;
  const slots = slotsOf(cfg);
  const ew = af.emptyWeight ?? 0, ela = af.emptyLongArm ?? 4670, eta = af.emptyLatArm ?? 0;
  let bem = ew, bemL = ew * ela, bemA = ew * eta;

  Object.entries(af.doors || {}).forEach(([k, d]) => {
    const fit = fl.doors?.[k] ?? d.fitted;
    if (!fit && d.fitted) { bem -= d.weight; bemL -= d.weight * d.longArm; bemA -= d.weight * d.latArm; }
    else if (fit && !d.fitted) { bem += d.weight; bemL += d.weight * d.longArm; bemA += d.weight * d.latArm; }
  });

  if (fl.lrTankFitted && af.lrTankSystem !== 'none') {
    const fw = af.lrTankSystem === 'dual' ? 13.8 : 12.0;
    const fa = af.lrTankSystem === 'dual' ? 4754 : 4860;
    bem += fw; bemL += fw * fa;
  }

  let etw = 0, etL = 0, etA = 0;
  ['L','R'].forEach(side => {
    const tk = fl[`lrTank${side}`];
    if (tk?.installed) {
      const tw = 26.3, ta = tk.position === 'fwd' ? 4865 : 5398, tlat = side === 'L' ? -380 : 380;
      etw += tw; etL += tw * ta; etA += tw * tlat;
    }
  });

  const items = (fl.placed || []).filter(p => (parseFloat(p.weight) || 0) > 0).map(p => {
    const wt = parseFloat(p.weight) || 0;
    if (p.type === 'hook') return { ...p, weight: wt, longArm: af.hookArm ?? 4500, latArm: af.hookLatArm ?? 0 };
    if (p.slotId && slots[p.slotId]) {
      const { longArm, latArm } = armsFor(slots[p.slotId], p.slotId, cfg, af);
      return { ...p, weight: wt, longArm, latArm };
    }
    return { ...p, weight: wt, longArm: 4170, latArm: 0 };
  });

  const itemWt = items.reduce((s, i) => s + i.weight, 0);
  const itemL  = items.reduce((s, i) => s + i.weight * i.longArm, 0);
  const itemA  = items.reduce((s, i) => s + i.weight * i.latArm, 0);

  const zfW = bem + etw + itemWt;
  const zfLM = bemL + etL + itemL, zfAM = bemA + etA + itemA;
  const zfLC = zfW > 0 ? zfLM / zfW : 0, zfAC = zfW > 0 ? zfAM / zfW : 0;

  const mf = parseFloat(fl.mainFuel) || 0;
  const lfL = parseFloat(fl.lrFuelL) || 0, lfR = parseFloat(fl.lrFuelR) || 0;
  const lrLArm = fl.lrTankL?.position === 'fwd' ? 4852 : 5385;
  const lrRArm = fl.lrTankR?.position === 'fwd' ? 4852 : 5385;
  const fW = mf + lfL + lfR;
  const fLM = mf * fuelArm(mf) + lfL * lrLArm + lfR * lrRArm;
  const fAM = lfL * -380 + lfR * 380;

  const auW = zfW + fW, auLM = zfLM + fLM, auAM = zfAM + fAM;
  const auLC = auW > 0 ? auLM / auW : 0, auAC = auW > 0 ? auAM / auW : 0;

  // Mid-fuel
  const mmf = mf / 2;
  const mfW = mmf + lfL/2 + lfR/2;
  const mfLM = mmf * fuelArm(mmf) + (lfL/2) * lrLArm + (lfR/2) * lrRArm;
  const mfAM = (lfL/2) * -380 + (lfR/2) * 380;
  const mW = zfW + mfW;
  const mLC = mW > 0 ? (zfLM + mfLM) / mW : 0;
  const mAC = mW > 0 ? (zfAM + mfAM) / mW : 0;

  const auLL = interp(LONG_ENV, auW, 'fwd', 'aft');
  const auAL = interp(LAT_ENV, auW, 'left', 'right');
  const zfLL = interp(LONG_ENV, zfW, 'fwd', 'aft');
  const zfAL = interp(LAT_ENV, zfW, 'left', 'right');

  const maxTOW = af.maxTOW ?? 3500, maxSkid = af.maxSkid ?? 3350, minTOW = af.minTOW ?? 1700;
  const warnings = [];
  if (auW > maxTOW) warnings.push(`Over MaxTOW by ${(auW-maxTOW).toFixed(1)} kg`);
  if (auW > maxSkid) warnings.push(`Over MaxSkid by ${(auW-maxSkid).toFixed(1)} kg`);
  if (auW < minTOW && auW > 100) warnings.push('Under MinTOW');
  if (auW > 0 && auLC < auLL.fwd) warnings.push('Fwd CG limit (AU)');
  if (auW > 0 && auLC > auLL.aft) warnings.push('Aft CG limit (AU)');
  if (auW > 0 && auAC < auAL.left) warnings.push('Left lat limit');
  if (auW > 0 && auAC > auAL.right) warnings.push('Right lat limit');
  if (zfW > 0 && zfLC < zfLL.fwd) warnings.push('Fwd CG (ZF)');
  if (zfW > 0 && zfLC > zfLL.aft) warnings.push('Aft CG (ZF)');

  return {
    bem, bemL, bemA,
    zfWeight: zfW, zfLongCG: zfLC, zfLatCG: zfAC,
    midWeight: mW, midLongCG: mLC, midLatCG: mAC,
    auWeight: auW, auLongCG: auLC, auLatCG: auAC,
    auLongLim: auLL, auLatLim: auAL,
    zfLongLim: zfLL, zfLatLim: zfAL,
    warnings, items, fuelWt: fW,
  };
};

// ============================================================
// SLOT LOGIC HELPERS
// ============================================================

const getBlockedSlots = (placed, cfg) => {
  const conflicts = conflictsOf(cfg);
  const blocked = new Set();
  placed.forEach(p => {
    if (p.slotId) {
      blocked.add(p.slotId);
      (conflicts[p.slotId] || []).forEach(s => blocked.add(s));
    }
  });
  return blocked;
};

const findFreeSlot = (type, placed, cfg) => {
  const blocked = getBlockedSlots(placed, cfg);
  return (typeSlotsOf(cfg)[type] || []).find(s => !blocked.has(s)) || null;
};

// ============================================================
// AIRCRAFT BUILDER
// ============================================================

const Cabin = ({ flight, setFlight, cfg }) => {
  const svgRef = useRef(null);
  const [dragId, setDragId] = useState(null);
  const [editId, setEditId] = useState(null);
  const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
  const [hoverSlot, setHoverSlot] = useState(null);
  // Tracks a pending pointer interaction before we know if it's a tap or drag.
  const pending = useRef(null); // { id, startX, startY, offsetX, offsetY, moved }

  const SLOTS_C = slotsOf(cfg);
  const TYPE_SLOTS_C = typeSlotsOf(cfg);

  const placed = flight.placed || [];
  const blocked = useMemo(() => getBlockedSlots(placed, cfg), [placed, cfg]);

  const update = (id, ch) => setFlight({ ...flight, placed: placed.map(p => p.id === id ? { ...p, ...ch } : p) });
  const remove = (id) => { setFlight({ ...flight, placed: placed.filter(p => p.id !== id) }); if (editId === id) setEditId(null); };

  const toSvgPt = (cx, cy) => {
    const svg = svgRef.current;
    if (!svg) return { x: 0, y: 0 };
    const r = svg.getBoundingClientRect();
    return { x: (cx - r.left) * (200 / r.width), y: (cy - r.top) * (290 / r.height) };
  };

  const nearestSlot = (item, x, y) => {
    const candidates = TYPE_SLOTS_C[item.type] || [];
    // Recompute blocked slots EXCLUDING the item being dragged — otherwise an
    // item blocks its own movement (e.g. a stretcher in stretcher_R blocks
    // stretcher_L via conflict rules, so it could never be dragged left).
    const others = placed.filter(p => p.id !== item.id);
    const blockedExSelf = getBlockedSlots(others, cfg);
    let best = null, bd = Infinity;
    candidates.forEach(id => {
      if (blockedExSelf.has(id)) return;
      const s = SLOTS_C[id];
      if (!s) return;
      const d = Math.hypot(s.x - x, s.y - y);
      if (d < bd) { best = id; bd = d; }
    });
    return best;
  };

  // Pointer down: start tracking but don't commit to a drag yet. We only know
  // whether this is a tap (→ select for editing) or a drag (→ reposition) once
  // the pointer either moves past a threshold or is released. This lets a
  // selected item still be dragged to another slot.
  const onDown = (e, item) => {
    e.preventDefault(); e.stopPropagation();
    const pt = toSvgPt(e.clientX, e.clientY);
    pending.current = {
      id: item.id,
      offsetX: pt.x - item.x,
      offsetY: pt.y - item.y,
      moved: false,
    };
    // Capture on the SVG (which owns the move/up handlers) — more reliable on
    // iOS Safari than capturing on the inner <g>.
    try {
      const svg = svgRef.current;
      if (svg && svg.setPointerCapture) svg.setPointerCapture(e.pointerId);
    } catch {}
  };

  const onMove = (e) => {
    const pend = pending.current;
    if (!pend && !dragId) return;
    e.preventDefault();
    const pt = toSvgPt(e.clientX, e.clientY);

    // Promote a pending interaction to a real drag once it moves past threshold.
    if (pend && !dragId) {
      const item = placed.find(p => p.id === pend.id);
      if (!item) return;
      const dist = Math.hypot((pt.x - pend.offsetX) - item.x, (pt.y - pend.offsetY) - item.y);
      if (dist > 3) {
        // Began dragging — close any editor and start the drag
        if (editId) setEditId(null);
        setDragOffset({ x: pend.offsetX, y: pend.offsetY });
        setDragId(pend.id);
        pend.moved = true;
      } else {
        return; // still within tap threshold
      }
    }

    if (!dragId && !(pend && pend.moved)) return;
    const activeId = dragId || pend.id;
    const ox = dragId ? dragOffset.x : pend.offsetX;
    const oy = dragId ? dragOffset.y : pend.offsetY;
    const nx = Math.max(60, Math.min(140, pt.x - ox));
    const ny = Math.max(40, Math.min(280, pt.y - oy));
    update(activeId, { x: nx, y: ny });
    const item = placed.find(p => p.id === activeId);
    if (item) setHoverSlot(nearestSlot(item, nx, ny));
  };

  const onUp = (e) => {
    const pend = pending.current;
    // Case 1: this was a drag — snap to nearest slot
    if (dragId) {
      e.preventDefault();
      const item = placed.find(p => p.id === dragId);
      if (item) {
        const slotId = nearestSlot(item, item.x, item.y);
        if (slotId) {
          const s = SLOTS_C[slotId];
          update(dragId, { x: s.x, y: s.y, slotId });
        }
      }
      setDragId(null);
      setHoverSlot(null);
      pending.current = null;
      return;
    }
    // Case 2: this was a tap (no movement) — toggle edit selection
    if (pend && !pend.moved) {
      setEditId(prev => prev === pend.id ? null : pend.id);
    }
    pending.current = null;
  };

  const draggingItem = placed.find(p => p.id === dragId);

  // Close inline editor when clicking outside the cabin
  const containerRef = useRef(null);
  useEffect(() => {
    if (!editId) return;
    const handler = (e) => {
      if (containerRef.current && !containerRef.current.contains(e.target)) {
        setEditId(null);
      }
    };
    document.addEventListener('mousedown', handler);
    document.addEventListener('touchstart', handler);
    return () => {
      document.removeEventListener('mousedown', handler);
      document.removeEventListener('touchstart', handler);
    };
  }, [editId]);

  return (
    <div ref={containerRef} className="relative w-full mx-auto select-none" style={{ maxWidth: '380px', touchAction: 'none' }}>
      <svg ref={svgRef} viewBox="0 0 200 290" className="w-full h-auto" style={{ touchAction: 'none' }}
           onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp}
           onClick={(e) => {
             // Tapping empty SVG area (not on a placed item) closes the editor
             if (editId && e.target.tagName === 'svg') setEditId(null);
           }}>

        <defs>
          {/* Hatch pattern for baggage zone */}
          <pattern id="bagHatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="4" stroke="var(--text-3)" strokeWidth="0.4" opacity="0.4"/>
          </pattern>
        </defs>

        {/* Station markings (engineering datum lines along the left edge) */}
        {(() => {
          // Pull unique long-arm values from current config's cabin slots
          const stations = [...new Set(Object.values(SLOTS_C)
            .filter(s => s.group !== 'crew')
            .map(s => s.longArm))].sort((a, b) => a - b);
          // Plus crew always
          const allStations = [2867, ...stations];
          // Map STA to y coordinate. Crew ≈ y=50; baggage ≈ y=232.
          // Approx mapping: STA 2867 → y=50, STA 5494 → y=232.
          const yForSta = (sta) => 50 + (sta - 2867) / (5494 - 2867) * (232 - 50);
          return allStations.map(sta => (
            <g key={sta}>
              <line x1="10" y1={yForSta(sta)} x2="190" y2={yForSta(sta)}
                    stroke="var(--border)" strokeWidth="0.3" strokeDasharray="1.2 2" opacity="0.7"/>
              <text x="6" y={yForSta(sta) + 1.6} className="efb-mono"
                    fontSize="4.2" fill="var(--text-3)" letterSpacing="0.05em">{sta}</text>
            </g>
          ));
        })()}

        {/* FWD indicator */}
        <g opacity="0.7">
          <path d="M 96 10 L 100 4 L 104 10" stroke="var(--text-2)" strokeWidth="0.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
          <line x1="100" y1="4" x2="100" y2="18" stroke="var(--text-2)" strokeWidth="0.8" strokeLinecap="round"/>
          <text x="110" y="12" className="efb-mono" fontSize="5" fill="var(--text-2)" letterSpacing="0.15em">FWD</text>
        </g>

        {/* Fuselage outline — thin engineering line */}
        <path d="M 100 22 C 76 22 60 36 56 56 L 56 252 C 56 266 68 276 84 276 L 116 276 C 132 276 144 266 144 252 L 144 56 C 140 36 124 22 100 22 Z"
              fill="var(--bg-2)" fillOpacity="0.3"
              stroke="var(--border-strong)" strokeWidth="0.7" strokeLinejoin="round"/>

        {/* Cockpit canopy */}
        <path d="M 100 28 C 80 28 66 40 62 56 L 138 56 C 134 40 120 28 100 28 Z"
              fill="none" stroke="var(--border)" strokeWidth="0.5"/>
        <line x1="100" y1="28" x2="100" y2="56" stroke="var(--border)" strokeWidth="0.4"/>

        {/* Cockpit / cabin bulkhead */}
        <line x1="56" y1="84" x2="144" y2="84" stroke="var(--border)" strokeWidth="0.5" strokeDasharray="1.5 1.5"/>

        {/* Door indicators (thin marks on fuselage edge) */}
        <rect x="54" y="95" width="2" height="40" fill="var(--bg-3)" stroke="var(--border-strong)" strokeWidth="0.3"/>
        <rect x="144" y="95" width="2" height="40" fill="var(--bg-3)" stroke="var(--border-strong)" strokeWidth="0.3"/>
        <rect x="54" y="74" width="2" height="10" fill="var(--bg-3)" stroke="var(--border-strong)" strokeWidth="0.3"/>
        <rect x="144" y="74" width="2" height="10" fill="var(--bg-3)" stroke="var(--border-strong)" strokeWidth="0.3"/>

        {/* Clamshell rear hint */}
        <line x1="100" y1="246" x2="100" y2="272" stroke="var(--border)" strokeWidth="0.4" strokeDasharray="1.5 1.5"/>

        {/* Placeholder slots — clean dashed outlines */}
        {(() => {
          // While dragging, an item shouldn't be blocked by its own conflicts —
          // so the opposite stretcher slot (and any slot it currently blocks)
          // becomes a visible, valid drop target.
          const draggingItem = (dragId || pending.current?.id)
            ? placed.find(p => p.id === (dragId || pending.current?.id))
            : null;
          const effectiveBlocked = draggingItem
            ? getBlockedSlots(placed.filter(p => p.id !== draggingItem.id), cfg)
            : blocked;
          const dragTargets = draggingItem ? new Set(TYPE_SLOTS_C[draggingItem.type] || []) : null;
          return Object.entries(SLOTS_C).map(([id, slot]) => {
            // Hide if blocked, UNLESS it's a valid target for the item being dragged
            if (effectiveBlocked.has(id)) return null;
            if (draggingItem && dragTargets && !dragTargets.has(id) && placed.some(p => p.slotId === id)) return null;
            const isHover = hoverSlot === id;
            const isBag = slot.group === 'cargo';
            return (
              <g key={id}>
                <rect
                  x={slot.x - slot.w/2} y={slot.y - slot.h/2}
                  width={slot.w} height={slot.h}
                  rx={slot.group === 'stretcher' ? 3 : 1.5}
                  fill={isHover ? 'var(--accent-bg)' : (isBag ? 'url(#bagHatch)' : 'var(--bg-2)')}
                  fillOpacity={isHover ? 0.6 : 0.5}
                  stroke={isHover ? 'var(--accent)' : 'var(--border-strong)'}
                  strokeWidth={isHover ? 0.9 : 0.4}
                  strokeDasharray={isHover ? '0' : '1.2 1.2'}/>
                {!isHover && slot.group === 'pax' && (
                  <text x={slot.x} y={slot.y + 1.5} textAnchor="middle"
                        className="efb-mono" fontSize="3.5" fill="var(--text-3)" letterSpacing="0.05em">
                    {id.replace('pax_', '').toUpperCase()}
                  </text>
                )}
                {!isHover && slot.group === 'cargo' && (
                  <text x={slot.x} y={slot.y + 1.5} textAnchor="middle"
                        className="efb-mono" fontSize="3.5" fill="var(--text-3)" letterSpacing="0.1em">BAG</text>
                )}
                {!isHover && slot.group === 'crew' && (
                  <text x={slot.x} y={slot.y + 1.5} textAnchor="middle"
                      className="efb-mono" fontSize="3.5" fill="var(--text-3)" letterSpacing="0.05em">
                  {id === 'pilot' ? 'P1' : 'P2'}
                </text>
              )}
            </g>
          );
          });
        })()}

        {/* Placed items */}
        {placed.filter(p => p.type !== 'hook').map(item => (
          <PlacedItem key={item.id} item={item} isEdit={editId === item.id} isDrag={dragId === item.id}
                      onDown={onDown}
                      onUpdate={(wt) => update(item.id, { weight: wt })}
                      onUpdateName={(nm) => update(item.id, { name: nm })}
                      onCommit={() => setEditId(null)}
                      onRemove={() => remove(item.id)}/>
        ))}
      </svg>
    </div>
  );
};

const PlacedItem = ({ item, isEdit, isDrag, onDown, onUpdate, onUpdateName, onCommit, onRemove }) => {
  const meta = ITEM_TYPES[item.type];
  const w = parseFloat(item.weight) || 0;
  const filled = w > 0;
  const isStr = item.type === 'stretcher';
  const isBag = item.type === 'baggage';
  const isCrew = item.type === 'pilot' || item.type === 'copilot';

  // EFB colour scheme: neutral for pax/baggage, accent for crew, patient for stretcher
  const colors = isStr
    ? { stroke: 'var(--patient)', fill: 'rgba(217,119,87,0.18)', text: 'var(--patient)' }
    : isCrew
    ? { stroke: 'var(--accent)', fill: 'var(--bg-3)', text: 'var(--accent)' }
    : { stroke: 'var(--text-2)', fill: 'var(--bg-3)', text: 'var(--text-0)' };

  // Local editing state — value commits live on every keystroke via onUpdate.
  // onCommit closes the editor (called on blur, Enter, or Escape).
  const [draft, setDraft] = useState(String(w || ''));
  useEffect(() => { if (isEdit) setDraft(w === 0 ? '' : String(w)); }, [isEdit, w]);

  const updateDraft = (v) => {
    setDraft(v);
    if (v === '') onUpdate(0);
    else {
      const n = parseFloat(v);
      if (Number.isFinite(n)) onUpdate(n);
    }
  };

  // Inline editor positioning
  const editorBox = isStr
    ? { x: -10, y: -3, w: 20, h: 8 }
    : isBag
    ? { x: -19, y: -5, w: 38, h: 10 }
    : { x: -11, y: -4, w: 22, h: 8 };

  // Delete badge corner
  const badge = isStr
    ? { x: 14, y: -54 }
    : isBag
    ? { x: 19, y: -10 }
    : { x: 12, y: -12 };

  // Short name to show on the seat (truncated so it fits the small chip).
  const nm = (item.name || '').trim();
  const shortName = nm.length > 8 ? nm.slice(0, 7) + '…' : nm;

  // Slot tag (always available — 1A, P1, BAG, PATIENT)
  const slotTag = isCrew
    ? (item.type === 'pilot' ? 'P1' : 'P2')
    : isBag
    ? 'BAG'
    : isStr
    ? 'PATIENT'
    : (item.slotId ? item.slotId.replace('pax_', '').toUpperCase() : '');

  // Sublabel under the chip: prefer the name if entered, else the slot tag
  const sublabel = shortName || slotTag;

  return (
    <g transform={`translate(${item.x},${item.y})`}
       style={{ cursor: isDrag ? 'grabbing' : 'grab', touchAction: 'none' }}
       onPointerDown={(e) => onDown(e, item)}>

      {isStr ? (
        <g>
          {/* Patient label at head — shows name if entered, else "PATIENT" */}
          <text y="-46" textAnchor="middle" className="efb-mono"
                fontSize="3.2" fill={colors.text} letterSpacing="0.15em" fontWeight="500">
            {shortName ? shortName.toUpperCase() : 'PATIENT'}
          </text>
          {/* Body outline */}
          <rect x="-14" y="-42" width="28" height="96" rx="6"
                fill={colors.fill}
                stroke={colors.stroke} strokeWidth={isEdit ? 1.2 : 0.8}/>
          {/* Subtle cross-rungs */}
          <line x1="-14" y1="-20" x2="14" y2="-20" stroke={colors.stroke} strokeWidth="0.3" strokeDasharray="1 1.5" opacity="0.5"/>
          <line x1="-14" y1="8" x2="14" y2="8" stroke={colors.stroke} strokeWidth="0.3" strokeDasharray="1 1.5" opacity="0.5"/>
          {/* Weight in middle */}
          {!isEdit && (
            <text y="-2" textAnchor="middle" className="efb-mono"
                  fontSize="6" fill={colors.text} fontWeight="500">{filled ? w : '—'}</text>
          )}
          {!isEdit && (
            <text y="6" textAnchor="middle" className="efb-mono"
                  fontSize="3" fill={colors.text} letterSpacing="0.1em" opacity="0.7">KG</text>
          )}
        </g>
      ) : isBag ? (
        <g>
          <rect x="-19" y="-10" width="38" height="20" rx="1.5"
                fill={colors.fill}
                stroke={colors.stroke} strokeWidth={isEdit ? 1.2 : 0.6}/>
          {!isEdit && (
            <>
              <text y="0" textAnchor="middle" className="efb-mono"
                    fontSize="5" fill={colors.text} fontWeight="500">{filled ? w : '—'}</text>
              <text y="7" textAnchor="middle" className="efb-mono"
                    fontSize="2.8" fill="var(--text-2)" letterSpacing="0.15em">BAG · KG</text>
            </>
          )}
        </g>
      ) : (
        <g>
          <rect x="-12" y="-12" width="24" height="24" rx="1.5"
                fill={colors.fill}
                stroke={colors.stroke} strokeWidth={isEdit ? 1.2 : 0.6}/>
          {!isEdit && (
            <>
              <text y="0" textAnchor="middle" className="efb-mono"
                    fontSize="5.5" fill={colors.text} fontWeight="500">
                {filled ? w : '—'}
              </text>
              <text y="7" textAnchor="middle" className="efb-mono"
                    fontSize="3" fill="var(--text-2)" letterSpacing="0.1em">{sublabel}</text>
            </>
          )}
        </g>
      )}

      {/* Inline weight editor */}
      {isEdit && (
        <foreignObject x={editorBox.x} y={editorBox.y} width={editorBox.w} height={editorBox.h}
                       onPointerDown={(e) => e.stopPropagation()}
                       onClick={(e) => e.stopPropagation()}>
          <input
            xmlns="http://www.w3.org/1999/xhtml"
            type="number"
            inputMode="decimal"
            autoFocus
            value={draft}
            onFocus={(e) => e.target.select()}
            onChange={(e) => updateDraft(e.target.value)}
            onBlur={() => onCommit()}
            onKeyDown={(e) => {
              if (e.key === 'Enter')  { e.preventDefault(); e.target.blur(); }
              if (e.key === 'Escape') { e.preventDefault(); onCommit(); }
            }}
            style={{
              width: '100%', height: '100%', boxSizing: 'border-box',
              padding: 0, margin: 0,
              background: 'transparent', border: 'none', outline: 'none',
              textAlign: 'center', color: colors.text,
              fontWeight: 500, fontFamily: 'ui-monospace, SF Mono, monospace',
              fontSize: isStr ? '5.5px' : isBag ? '4.5px' : '5.5px',
              MozAppearance: 'textfield',
              WebkitAppearance: 'none',
              appearance: 'textfield',
            }}
            onWheel={(e) => e.target.blur()}
            className="no-spinner"
          />
        </foreignObject>
      )}

      {/* Inline name editor — below the chip; not for baggage (cargo has no name) */}
      {isEdit && !isBag && (
        <foreignObject x={isStr ? -22 : -24} y={isStr ? 56 : 14} width={isStr ? 44 : 48} height="12"
                       onPointerDown={(e) => e.stopPropagation()}
                       onClick={(e) => e.stopPropagation()}>
          <input
            xmlns="http://www.w3.org/1999/xhtml"
            type="text"
            value={item.name || ''}
            placeholder="name"
            onChange={(e) => onUpdateName(e.target.value)}
            onBlur={() => onCommit()}
            onKeyDown={(e) => {
              if (e.key === 'Enter')  { e.preventDefault(); e.target.blur(); }
              if (e.key === 'Escape') { e.preventDefault(); onCommit(); }
            }}
            style={{
              width: '100%', boxSizing: 'border-box',
              padding: '0 1px', margin: 0,
              background: 'var(--bg-1)', border: '0.4px solid var(--border-strong)',
              borderRadius: '1.5px', outline: 'none',
              textAlign: 'center', color: 'var(--text-0)',
              fontFamily: 'ui-monospace, SF Mono, monospace',
              fontSize: '5px',
            }}
          />
        </foreignObject>
      )}

      {/* Subtle delete affordance — only when selected */}
      {isEdit && (
        <g transform={`translate(${badge.x},${badge.y})`}
           onPointerDown={(e) => { e.stopPropagation(); e.preventDefault(); }}
           onPointerUp={(e) => { e.stopPropagation(); e.preventDefault(); onRemove(); }}
           style={{ cursor: 'pointer' }}>
          <circle r="3.2" fill="var(--bg-1)" stroke="var(--text-3)" strokeWidth="0.4"/>
          <path d="M -1.4 -1.4 L 1.4 1.4 M -1.4 1.4 L 1.4 -1.4"
                stroke="var(--text-2)" strokeWidth="0.6" strokeLinecap="round"/>
        </g>
      )}
    </g>
  );
};

// Standard number input — locks value on every keystroke, no Enter required.
const NumInput = ({ value, onChange, placeholder = '0', className = '' }) => (
  <input type="number" inputMode="decimal" className={`efb-input w-full no-spinner ${className}`}
    value={value === 0 || value === '' ? '' : value}
    onChange={(e) => {
      const v = e.target.value;
      if (v === '') onChange(0);
      else {
        const n = parseFloat(v);
        if (Number.isFinite(n)) onChange(n);
      }
    }}
    placeholder={placeholder}/>
);

// Compact inline number — right-aligned, monospace, no border until focused.
// Used in tight rows like Fuel where the input should look like static text
// until the user taps it.
const InlineNum = ({ value, onChange, placeholder = '0', suffix, fill }) => (
  <span className="flex items-baseline gap-1" style={fill ? { width: '100%', justifyContent: 'flex-end' } : undefined}>
    <input type="number" inputMode="decimal" className="no-spinner"
      value={value === 0 || value === '' ? '' : value}
      onChange={(e) => {
        const v = e.target.value;
        if (v === '') onChange(0);
        else {
          const n = parseFloat(v);
          if (Number.isFinite(n)) onChange(n);
        }
      }}
      onFocus={(e) => e.target.select()}
      placeholder={placeholder}
      style={{
        width: fill ? '100%' : '60px',
        background: 'transparent', border: 'none', outline: 'none',
        textAlign: 'right',
        color: 'var(--text-0)',
        fontFamily: 'var(--mono)', fontSize: '12px',
        padding: fill ? '2px 0' : '2px 4px', borderRadius: '2px',
      }}
      onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-3)'}
      onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
    />
    {suffix && (
      <span className="efb-caps-sm" style={{ color: 'var(--text-2)', fontSize: '10px' }}>{suffix}</span>
    )}
  </span>
);

// Inline name field for the Data table — left-aligned text, subtle until focused.
const NameInput = ({ value, onChange, placeholder = '—' }) => (
  <input type="text" value={value || ''} placeholder={placeholder}
    onChange={(e) => onChange(e.target.value)}
    style={{
      width: '100%', maxWidth: '140px',
      background: 'transparent', border: 'none', outline: 'none',
      textAlign: 'left',
      color: value ? 'var(--text-0)' : 'var(--text-3)',
      fontFamily: 'system-ui, sans-serif', fontSize: '12px',
      padding: '2px 4px', borderRadius: '2px',
    }}
    onMouseEnter={(e) => e.currentTarget.style.background = 'var(--bg-3)'}
    onMouseLeave={(e) => e.currentTarget.style.background = 'transparent'}
  />
);

// Custom aircraft selector — replaces native <select> so the EFB look stays
// consistent across iOS/Safari/Chrome and avoids the OS-native dropdown chrome.
const AircraftPicker = ({ fleet, activeId, setActiveId }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    if (!open) return;
    const close = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', close);
    document.addEventListener('touchstart', close);
    return () => {
      document.removeEventListener('mousedown', close);
      document.removeEventListener('touchstart', close);
    };
  }, [open]);

  const active = fleet.find(a => a.id === activeId) || fleet[0];

  return (
    <div ref={ref} className="relative">
      <button onClick={() => setOpen(o => !o)} className="efb-input cursor-pointer flex items-center gap-2"
        style={{ paddingRight: '28px', position: 'relative', letterSpacing: '0.05em' }}>
        <span style={{ color: 'var(--text-0)' }}>{active?.tail}</span>
        <span style={{ color: 'var(--text-2)' }}>— {active?.variant}</span>
        <span style={{
          position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)',
          color: 'var(--text-2)', fontSize: '9px',
          transition: 'transform 0.15s',
          transformOrigin: 'center',
        }}>
          <span style={{ display: 'inline-block', transform: open ? 'rotate(180deg)' : 'rotate(0)' }}>▾</span>
        </span>
      </button>
      {open && (
        <div className="efb-panel" style={{
          position: 'absolute', top: 'calc(100% + 4px)', left: 0, minWidth: '100%',
          zIndex: 50, padding: '4px', boxShadow: '0 8px 24px rgba(0,0,0,0.4)',
        }}>
          {fleet.map(a => {
            const isActive = a.id === activeId;
            return (
              <button key={a.id} onClick={() => { setActiveId(a.id); setOpen(false); }}
                className="w-full flex items-center gap-2 px-2.5 py-2 transition-colors"
                style={{
                  background: isActive ? 'var(--accent-bg)' : 'transparent',
                  border: 'none', borderRadius: '2px',
                  textAlign: 'left', cursor: 'pointer',
                  fontFamily: 'var(--mono)', fontSize: '12px',
                  letterSpacing: '0.05em',
                }}
                onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.background = 'var(--bg-2)'; }}
                onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}>
                <span style={{ color: isActive ? 'var(--accent)' : 'var(--text-0)' }}>{a.tail}</span>
                <span style={{ color: 'var(--text-2)' }}>— {a.variant}</span>
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
};

const CGPlot = ({ calc, airframe, axis }) => {
  if (!calc || !airframe) return null;
  const W = 280, H = 220;
  const m = { t: 10, r: 10, b: 22, l: 36 };
  const pW = W - m.l - m.r, pH = H - m.t - m.b;
  const isLong = axis === 'long';
  const xMin = isLong ? 4300 : -150, xMax = isLong ? 4700 : 150;
  const yMin = 1600, yMax = 3600;
  const sx = (x) => m.l + ((x - xMin) / (xMax - xMin)) * pW;
  const sy = (y) => m.t + pH - ((y - yMin) / (yMax - yMin)) * pH;

  const env = isLong ? LONG_ENV : LAT_ENV;
  const k1 = isLong ? 'fwd' : 'left', k2 = isLong ? 'aft' : 'right';
  const envPts = [];
  env.forEach(p => envPts.push([p[k1], p.w]));
  [...env].reverse().forEach(p => envPts.push([p[k2], p.w]));
  const envPath = envPts.map(([x, y], i) => `${i === 0 ? 'M' : 'L'} ${sx(x)} ${sy(y)}`).join(' ') + ' Z';

  const pts = [
    { w: calc.zfWeight,  cg: isLong ? calc.zfLongCG : calc.zfLatCG,  c: 'var(--accent)', label: 'ZF' },
    { w: calc.midWeight, cg: isLong ? calc.midLongCG : calc.midLatCG, c: 'var(--text-1)', label: 'MID' },
    { w: calc.auWeight,  cg: isLong ? calc.auLongCG : calc.auLatCG,  c: 'var(--warn)', label: 'AU' },
  ].filter(p => (p.w ?? 0) > 0);

  const xTicks = isLong ? [4300, 4400, 4500, 4600, 4700] : [-100, -50, 0, 50, 100];
  const maxTOW = airframe.maxTOW ?? 3500, maxSkid = airframe.maxSkid ?? 3350;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto">
      <rect width={W} height={H} fill="var(--bg-2)"/>
      {/* Grid */}
      {xTicks.map(x => <line key={x} x1={sx(x)} y1={m.t} x2={sx(x)} y2={H-m.b} stroke="var(--border)" strokeWidth="0.4"/>)}
      {[1700,2400,3000,3500].map(y => <line key={y} x1={m.l} y1={sy(y)} x2={W-m.r} y2={sy(y)} stroke="var(--border)" strokeWidth="0.4"/>)}
      {!isLong && <line x1={sx(0)} y1={m.t} x2={sx(0)} y2={H-m.b} stroke="var(--border-strong)" strokeWidth="0.5"/>}

      {/* Envelope */}
      <path d={envPath} fill="var(--ok)" fillOpacity="0.08" stroke="var(--ok)" strokeWidth="1" opacity="0.85"/>

      {/* Limit lines */}
      <line x1={m.l} y1={sy(maxTOW)} x2={W-m.r} y2={sy(maxTOW)} stroke="var(--alert)" strokeWidth="0.8" strokeDasharray="3,2"/>
      <text x={W-m.r-2} y={sy(maxTOW)-3} fill="var(--alert)" fontSize="7" textAnchor="end"
            style={{ fontFamily: 'var(--mono)', letterSpacing: '0.1em' }}>MAX TOW</text>
      {isLong && (
        <>
          <line x1={m.l} y1={sy(maxSkid)} x2={W-m.r} y2={sy(maxSkid)} stroke="var(--warn)" strokeWidth="0.8" strokeDasharray="2,2"/>
          <text x={W-m.r-2} y={sy(maxSkid)-3} fill="var(--warn)" fontSize="7" textAnchor="end"
                style={{ fontFamily: 'var(--mono)', letterSpacing: '0.1em' }}>MAX SKID</text>
        </>
      )}

      {/* Trace line connecting points */}
      {pts.length > 1 && (
        <path d={pts.map((p,i) => `${i===0?'M':'L'} ${sx(p.cg)} ${sy(p.w)}`).join(' ')}
              stroke="var(--text-2)" strokeWidth="0.8" fill="none" strokeDasharray="2,2" opacity="0.7"/>
      )}

      {/* CG points */}
      {pts.map((p,i) => (
        <g key={i}>
          <circle cx={sx(p.cg)} cy={sy(p.w)} r="3.5" fill={p.c} stroke="var(--bg-2)" strokeWidth="1"/>
          <text x={sx(p.cg)+6} y={sy(p.w)+2.5} fill={p.c} fontSize="8"
                style={{ fontFamily: 'var(--mono)', letterSpacing: '0.05em' }}>{p.label}</text>
        </g>
      ))}

      {/* Region labels */}
      {isLong ? (
        <>
          <text x={sx(4360)} y={sy(2400)} fill="var(--text-3)" fontSize="11" opacity="0.5"
                style={{ fontFamily: 'var(--mono)', letterSpacing: '0.15em' }}>FWD</text>
          <text x={sx(4620)} y={sy(2400)} fill="var(--text-3)" fontSize="11" opacity="0.5"
                style={{ fontFamily: 'var(--mono)', letterSpacing: '0.15em' }}>AFT</text>
        </>
      ) : (
        <>
          <text x={sx(-110)} y={sy(2400)} fill="var(--text-3)" fontSize="12" opacity="0.5"
                style={{ fontFamily: 'var(--mono)' }}>L</text>
          <text x={sx(100)} y={sy(2400)} fill="var(--text-3)" fontSize="12" opacity="0.5"
                style={{ fontFamily: 'var(--mono)' }}>R</text>
        </>
      )}

      {/* Tick labels */}
      {xTicks.map(x => <text key={x} x={sx(x)} y={H-m.b+11} fill="var(--text-2)" fontSize="7" textAnchor="middle"
                              style={{ fontFamily: 'var(--mono)' }}>{x}</text>)}
      {[1700,2400,3000,3500].map(y => <text key={y} x={m.l-4} y={sy(y)+2.5} fill="var(--text-2)" fontSize="7" textAnchor="end"
                                            style={{ fontFamily: 'var(--mono)' }}>{y}</text>)}
    </svg>
  );
};

const CGRow = ({ label, w, cg, lim, axis }) => {
  let status = 'ok', margin = null;
  const sw = w ?? 0, scg = cg ?? 0;
  if (lim && sw > 0) {
    const lo = axis === 'long' ? (lim.fwd ?? 0) : (lim.left ?? 0);
    const hi = axis === 'long' ? (lim.aft ?? 0) : (lim.right ?? 0);
    if (scg < lo) { status = 'lo'; margin = lo - scg; }
    else if (scg > hi) { status = 'hi'; margin = scg - hi; }
    else margin = Math.min(scg - lo, hi - scg);
  }
  return (
    <div className="flex items-center justify-between py-1.5" style={{ borderBottom: '1px solid var(--border)' }}>
      <span className="efb-caps" style={{ color: 'var(--text-1)' }}>{label}</span>
      <div className="flex items-center gap-3">
        <span className="efb-mono" style={{ fontSize: '12px', color: status !== 'ok' ? 'var(--alert)' : 'var(--text-0)' }}>
          {sw > 0 ? scg.toFixed(0) : '—'}
        </span>
        {sw > 0 && status === 'ok' && margin !== null && (
          <span className="efb-mono efb-caps-sm" style={{ color: 'var(--ok)' }}>±{margin.toFixed(0)}</span>
        )}
        {sw > 0 && status !== 'ok' && (
          <span className="efb-caps-sm" style={{ color: 'var(--alert)' }}>
            {status === 'lo' ? (axis === 'long' ? 'FWD' : 'L') : (axis === 'long' ? 'AFT' : 'R')}
          </span>
        )}
      </div>
    </div>
  );
};

const CGView = ({ calc, airframe }) => {
  if (!calc || !airframe) return null;
  const rows = [
    { l: 'Zero Fuel', w: calc.zfWeight,  long: calc.zfLongCG,  lat: calc.zfLatCG,  llim: calc.zfLongLim, alim: calc.zfLatLim },
    { l: 'Mid Fuel',  w: calc.midWeight, long: calc.midLongCG, lat: calc.midLatCG, llim: null, alim: null },
    { l: 'All Up',    w: calc.auWeight,  long: calc.auLongCG,  lat: calc.auLatCG,  llim: calc.auLongLim, alim: calc.auLatLim },

  return (
    <div className="grid md:grid-cols-2 gap-3">
      {['long','lat'].map(axis => (
        <div key={axis} className="efb-panel" style={{ padding: '12px' }}>
          <div className="flex items-center justify-between pb-2 mb-2" style={{ borderBottom: '1px solid var(--border)' }}>
            <span className="efb-caps">{axis === 'long' ? 'Longitudinal CG' : 'Lateral CG'}</span>
            <span className="efb-mono efb-caps-sm">MM</span>
          </div>
          <CGPlot calc={calc} airframe={airframe} axis={axis}/>
          <div className="mt-3 pt-1">
            {rows.map((r, i) => <CGRow key={i} label={r.l} w={r.w}
              cg={axis === 'long' ? r.long : r.lat}
              lim={axis === 'long' ? r.llim : r.alim}
              axis={axis}/>)}
          </div>
        </div>
      ))}
    </div>
  );
};

const DataView = ({ airframe, calc, flight, setFlight, cfg }) => {
  const updateItemWeight = (itemId, wt) => {
    setFlight({
      ...flight,
      placed: (flight.placed || []).map(p => p.id === itemId ? { ...p, weight: wt } : p)
    });
  };
  const updateItemName = (itemId, nm) => {
    setFlight({
      ...flight,
      placed: (flight.placed || []).map(p => p.id === itemId ? { ...p, name: nm } : p)
    });
  };
  const slots = slotsOf(cfg);

  // Build label for an item: use slot ID for pax (1A/2C/etc.), type label otherwise
  const labelFor = (item) => {
    if (item.type === 'pax') {
      const sid = item.slotId || '';
      const tag = sid.replace('pax_', '').toUpperCase();
      return tag ? `Pax ${tag}` : 'Pax';
    }
    if (item.type === 'pilot') return 'Pilot (P1)';
    if (item.type === 'copilot') return 'Co-pilot (P2)';
    if (item.type === 'stretcher') return 'Patient (Stretcher)';
    if (item.type === 'baggage') return 'Baggage';
    if (item.type === 'hook') return 'External Load (Hook)';
    return ITEM_TYPES[item.type]?.label || item.type;
  };

  // Match calc.items back to flight.placed so we can edit them in place
  const placed = flight.placed || [];

  return (
    <div className="efb-panel" style={{ padding: '14px', overflowX: 'auto' }}>
      <div className="flex items-baseline justify-between pb-2 mb-3" style={{ borderBottom: '1px solid var(--border)' }}>
        <span className="efb-caps" style={{ color: 'var(--text-0)', fontSize: '12px' }}>{airframe.tail} — {airframe.variant}</span>
        <span className="efb-mono efb-caps-sm">LOAD MANIFEST</span>
      </div>
      <table className="w-full" style={{ fontSize: '12px', borderCollapse: 'collapse' }}>
        <thead>
          <tr style={{ borderBottom: '1px solid var(--border-strong)' }}>
            <th className="text-left py-2 px-2 efb-caps-sm" style={{ color: 'var(--text-2)' }}>Item</th>
            <th className="text-left py-2 px-2 efb-caps-sm" style={{ color: 'var(--text-2)' }}>Name</th>
            <th className="text-right py-2 px-2 efb-caps-sm" style={{ color: 'var(--text-2)' }}>kg</th>
            <th className="text-right py-2 px-2 efb-caps-sm" style={{ color: 'var(--text-2)' }}>Long Arm<br/><span style={{ fontWeight: 400 }}>mm</span></th>
            <th className="text-right py-2 px-2 efb-caps-sm" style={{ color: 'var(--text-2)' }}>Long Moment<br/><span style={{ fontWeight: 400 }}>100 kg·mm</span></th>
            <th className="text-right py-2 px-2 efb-caps-sm" style={{ color: 'var(--text-2)' }}>Lat Arm<br/><span style={{ fontWeight: 400 }}>mm</span></th>
            <th className="text-right py-2 px-2 efb-caps-sm" style={{ color: 'var(--text-2)' }}>Lat Moment<br/><span style={{ fontWeight: 400 }}>100 kg·mm</span></th>
          </tr>
        </thead>
        <tbody className="efb-mono">
          <tr style={{ borderBottom: '1px solid var(--border)' }}>
            <td className="py-1.5 px-2" style={{ color: 'var(--text-1)', fontFamily: 'system-ui' }}>Basic Empty</td>
            <td className="px-2"></td>
            <td className="text-right px-2" style={{ color: 'var(--text-0)' }}>{calc.bem.toFixed(1)}</td>
            <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{calc.bem ? (calc.bemL/calc.bem).toFixed(0) : '—'}</td>
            <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{(calc.bemL / 100).toFixed(0)}</td>
            <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{calc.bem ? (calc.bemA/calc.bem).toFixed(0) : '—'}</td>
            <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{(calc.bemA / 100).toFixed(0)}</td>
          </tr>
          {placed.filter(p => p.type !== 'hook').map((p) => {
            const slot = p.slotId ? slots[p.slotId] : null;
            const { longArm, latArm } = slot
              ? armsFor(slot, p.slotId, cfg, airframe)
              : { longArm: 0, latArm: 0 };
            const wt = parseFloat(p.weight) || 0;
            const longMom = (wt * longArm) / 100;
            const latMom = (wt * latArm) / 100;
            const canName = p.type !== 'baggage';
            return (
              <tr key={p.id} style={{ borderBottom: '1px solid var(--border)' }}>
                <td className="py-1.5 px-2" style={{ color: 'var(--text-1)', fontFamily: 'system-ui' }}>{labelFor(p)}</td>
                <td className="px-2">
                  {canName && <NameInput value={p.name} onChange={(v) => updateItemName(p.id, v)}/>}

                <td className="text-right px-2">
                  <InlineNum value={p.weight} onChange={(v) => updateItemWeight(p.id, v)} fill/>

                <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{longArm.toFixed(0)}</td>
                <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{longMom.toFixed(0)}</td>
                <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{latArm.toFixed(0)}</td>

          {placed.filter(p => p.type === 'hook').map((p) => {
            const wt = parseFloat(p.weight) || 0;
            const longArm = airframe.hookArm ?? 4500;
            const latArm = airframe.hookLatArm ?? 0;
            return (
              <tr key={p.id} style={{ borderBottom: '1px solid var(--border)' }}>
                <td className="py-1.5 px-2" style={{ color: 'var(--text-1)', fontFamily: 'system-ui' }}>{labelFor(p)}</td>
                <td className="px-2"><NameInput value={p.name} onChange={(v) => updateItemName(p.id, v)}/></td>

                  <InlineNum value={p.weight} onChange={(v) => updateItemWeight(p.id, v)} fill/>
                </td>
                <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{longArm.toFixed(0)}</td>
                <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{((wt * longArm) / 100).toFixed(0)}</td>
                <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{latArm.toFixed(0)}</td>
                <td className="text-right px-2" style={{ color: 'var(--text-2)' }}>{((wt * latArm) / 100).toFixed(0)}</td>
              </tr>
            );
          })}
          <tr style={{ borderTop: '1px solid var(--border-strong)', borderBottom: '1px solid var(--border-strong)', background: 'var(--bg-2)' }}>
            <td className="py-2 px-2 efb-caps" style={{ color: 'var(--accent)', fontFamily: 'system-ui' }}>Zero Fuel</td>
            <td className="px-2"></td>
            <td className="text-right px-2" style={{ color: 'var(--accent)', fontWeight: 500 }}>{calc.zfWeight.toFixed(1)}</td>
            <td className="text-right px-2" style={{ color: 'var(--accent)', fontWeight: 500 }}>{calc.zfLongCG.toFixed(1)}</td>
            <td className="text-right px-2" style={{ color: 'var(--accent)', fontWeight: 500 }}>{((calc.zfWeight * calc.zfLongCG) / 100).toFixed(0)}</td>
            <td className="text-right px-2" style={{ color: 'var(--accent)', fontWeight: 500 }}>{calc.zfLatCG.toFixed(1)}</td>
            <td className="text-right px-2" style={{ color: 'var(--accent)', fontWeight: 500 }}>{((calc.zfWeight * calc.zfLatCG) / 100).toFixed(0)}</td>
          </tr>
          {calc.fuelWt > 0 && (
            <>
              <tr style={{ borderBottom: '1px solid var(--border)' }}>
                <td className="py-1.5 px-2" style={{ color: 'var(--warn)', fontFamily: 'system-ui' }}>+ Fuel</td>
                <td className="px-2"></td>
                <td className="text-right px-2" style={{ color: 'var(--warn)' }}>{calc.fuelWt.toFixed(1)}</td>
                <td colSpan="4"></td>
              </tr>
              <tr style={{ borderTop: '1px solid var(--border-strong)', background: 'var(--bg-2)' }}>
                <td className="py-2 px-2 efb-caps" style={{ color: 'var(--warn)', fontFamily: 'system-ui' }}>All Up</td>
                <td className="px-2"></td>
                <td className="text-right px-2" style={{ color: 'var(--warn)', fontWeight: 500 }}>{calc.auWeight.toFixed(1)}</td>
                <td className="text-right px-2" style={{ color: 'var(--warn)', fontWeight: 500 }}>{calc.auLongCG.toFixed(1)}</td>
                <td className="text-right px-2" style={{ color: 'var(--warn)', fontWeight: 500 }}>{((calc.auWeight * calc.auLongCG) / 100).toFixed(0)}</td>
                <td className="text-right px-2" style={{ color: 'var(--warn)', fontWeight: 500 }}>{calc.auLatCG.toFixed(1)}</td>
                <td className="text-right px-2" style={{ color: 'var(--warn)', fontWeight: 500 }}>{((calc.auWeight * calc.auLatCG) / 100).toFixed(0)}</td>
              </tr>
            </>
          )}
        </tbody>
      </table>
      {airframe.notes && (
        <div className="mt-3 pt-3" style={{ borderTop: '1px solid var(--border)', fontSize: '12px', color: 'var(--text-2)', fontStyle: 'italic', whiteSpace: 'pre-wrap' }}>{airframe.notes}</div>
      )}
    </div>
  );
};

    id: 'af-' + Date.now(), tail: 'NEW-XXX', variant: 'BK117 B-2',

        <div className="efb-panel p-3 space-y-2">

            <div><label className="efb-caps-sm block mb-1">Variant</label>

            <div><label className="efb-caps-sm block mb-1">Long Arm</label><NumInput value={editing.emptyLongArm} onChange={(v) => setF('emptyLongArm', v)}/></div>
            <div><label className="efb-caps-sm block mb-1">Lat Arm</label><NumInput value={editing.emptyLatArm} onChange={(v) => setF('emptyLatArm', v)}/></div>
            <div><label className="efb-caps-sm block mb-1">MaxTOW</label><NumInput value={editing.maxTOW} onChange={(v) => setF('maxTOW', v)}/></div>
            <div><label className="efb-caps-sm block mb-1">MaxSkid</label><NumInput value={editing.maxSkid} onChange={(v) => setF('maxSkid', v)}/></div>
            <div><label className="efb-caps-sm block mb-1">MinTOW</label><NumInput value={editing.minTOW} onChange={(v) => setF('minTOW', v)}/></div>
